<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Suivi de match — Tir à l'arc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Manrope:wght@300..700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    /* Dark blue-tinted base */
    --bg: #0e1420;
    --paper: #171e2c;
    --ink: #e6eaf4;
    --ink-soft: #a5adc0;
    --ink-mute: #6d7689;
    --line: #2a3346;
    --line-soft: #1d2536;

    /* Archery palette — tuned for dark background */
    --gold: #e0b048;
    --gold-soft: #9c7a2a;
    --gold-bg: #332611;

    --red: #e47272;
    --red-bg: #3e1f1f;

    --blue: #82aae2;
    --blue-bg: #1b2d49;

    --black-c: #a8aec1;
    --black-bg: #2d3446;

    --white-c: #d8d3c0;
    --white-border: #948d72;

    --miss: #d67070;
    --win: #5cb478;
    --loss: #e06464;
    --tie: #d8a252;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 15px;
    line-height: 1.5;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    min-height: 100vh;
    padding-bottom: 2rem;
  }
  @font-face {
    font-family: 'Manrope-fallback';
    src: local('system-ui');
    font-display: swap;
  }
  .display {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-optical-sizing: auto;
    letter-spacing: -0.02em;
  }

  /* ───── Header ───── */
  header.app-header {
    border-bottom: 1px solid var(--line);
    background: var(--paper);
    padding: 1.25rem 1.5rem 0;
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(8px);
  }
  .brand {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .brand h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-size: 1.8rem;
    letter-spacing: -0.025em;
    line-height: 1;
  }
  .brand .subtitle {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ink-mute);
    font-weight: 500;
  }
  .view-toggle {
    display: flex;
    gap: 0;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 3px;
    background: var(--bg);
  }
  .view-toggle button {
    border: 0;
    background: transparent;
    padding: 6px 16px;
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--ink-soft);
    cursor: pointer;
    border-radius: 999px;
    transition: all 0.15s;
  }
  .view-toggle button.active {
    background: var(--ink);
    color: var(--paper);
  }

  /* ───── Competition tabs ───── */
  .comp-tabs {
    display: flex;
    gap: 2rem;
    overflow-x: auto;
    padding-bottom: 0;
    margin: 0 -1.5rem;
    padding: 0 1.5rem;
    scrollbar-width: none;
  }
  .comp-tabs::-webkit-scrollbar { display: none; }
  .comp-tab {
    background: transparent;
    border: 0;
    padding: 0.6rem 0 0.8rem;
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--ink-mute);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
    transition: color 0.15s;
    letter-spacing: -0.01em;
  }
  .comp-tab:hover { color: var(--ink-soft); }
  .comp-tab.active {
    color: var(--ink);
    border-bottom-color: var(--gold);
  }
  .comp-tab .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--ink-mute);
    margin-left: 4px;
    font-weight: 400;
    vertical-align: 0.2em;
  }
  .comp-tab-add {
    color: var(--ink-mute);
    font-size: 1rem;
    padding: 0.6rem 0.3rem 0.8rem;
  }

  /* ───── Discipline tabs (top level) ───── */
  .disc-tabs {
    display: flex;
    gap: 1.4rem;
    overflow-x: auto;
    margin: 0 -1.5rem;
    padding: 0.35rem 1.5rem 0;
    scrollbar-width: none;
    align-items: center;
  }
  .disc-tabs::-webkit-scrollbar { display: none; }
  .disc-tab {
    background: transparent;
    border: 0;
    padding: 0.15rem 0 0.3rem;
    font-family: 'Manrope', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-mute);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s;
  }
  .disc-tab:hover { color: var(--ink-soft); }
  .disc-tab.active { color: var(--ink); border-bottom-color: var(--blue); }
  .disc-tab-add { letter-spacing: 0.04em; font-weight: 600; }

  /* ───── Team chips (second level) ───── */
  .team-tabs {
    display: flex;
    gap: 0.5rem;
    overflow-x: auto;
    margin: 0 -1.5rem;
    padding: 0.55rem 1.5rem 0.1rem;
    scrollbar-width: none;
    align-items: center;
  }
  .team-tabs::-webkit-scrollbar { display: none; }
  .team-chip {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--ink-soft);
    padding: 5px 12px;
    border-radius: 999px;
    cursor: pointer;
    font-family: 'Manrope', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    transition: all 0.12s;
  }
  .team-chip:hover { border-color: var(--ink-soft); color: var(--ink); }
  .team-chip.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .team-chip .edit { opacity: 0.7; font-size: 0.78rem; }
  .team-chip .edit:hover { opacity: 1; }
  .team-chip-add { border-style: dashed; color: var(--ink-mute); }

  /* ───── Team-edit modal fields ───── */
  .modal .field-label {
    display: block;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-mute);
    font-weight: 600;
    margin-bottom: 0.4rem;
  }
  .modal .archer-fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }
  .modal .archer-fields input { margin-bottom: 0; }
  .modal select.team-type-select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.95rem;
    background: var(--bg);
    color: var(--ink);
    margin-bottom: 1rem;
    outline: none;
    cursor: pointer;
  }
  .modal select.team-type-select:focus { border-color: var(--gold); }

  /* ───── Layout ───── */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1.5rem;
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 2rem;
  }
  @media (max-width: 900px) {
    main { grid-template-columns: 1fr; gap: 1rem; padding: 1rem; }
  }

  /* ───── Matches list ───── */
  aside.matches-panel {
    position: sticky;
    top: 120px;
    align-self: start;
    max-height: calc(100vh - 140px);
    overflow-y: auto;
  }
  @media (max-width: 900px) {
    aside.matches-panel { position: static; max-height: none; }
  }
  .panel-label {
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-mute);
    font-weight: 600;
    margin-bottom: 0.75rem;
    padding-left: 2px;
  }
  .matches-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 0.75rem;
  }
  .match-item {
    border: 0;
    background: transparent;
    text-align: left;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 0.88rem;
    color: var(--ink-soft);
    cursor: pointer;
    border-radius: 6px;
    display: flex;
    align-items: baseline;
    gap: 8px;
    border-left: 3px solid transparent;
    transition: all 0.1s;
  }
  .match-item:hover { background: rgba(255,255,255,0.04); }
  .match-item.active {
    background: var(--paper);
    border-left-color: var(--gold);
    color: var(--ink);
    font-weight: 500;
  }
  .match-item .num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--ink-mute);
    font-weight: 400;
    flex-shrink: 0;
    min-width: 1.5em;
  }
  .match-item .name {
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .match-item .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    padding: 2px 5px;
    border-radius: 3px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .match-item .badge.win { background: var(--win); color: white; }
  .match-item .badge.loss { background: var(--loss); color: white; }
  .match-item .badge.tie { background: var(--tie); color: white; }
  .btn-add-match {
    border: 1px dashed var(--line);
    background: transparent;
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.82rem;
    color: var(--ink-mute);
    cursor: pointer;
    transition: all 0.1s;
  }
  .btn-add-match:hover {
    border-color: var(--gold);
    color: var(--ink-soft);
    background: var(--paper);
  }

  /* ───── Match view ───── */
  .match-content {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1.5rem 1.75rem;
  }
  @media (max-width: 600px) {
    .match-content { padding: 1rem; }
  }
  .match-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--line-soft);
  }
  .match-meta {
    flex: 1;
    min-width: 0;
  }
  .match-meta .match-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 0.2rem;
  }
  .match-title {
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
    flex-wrap: wrap;
  }
  .match-title .vs {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 1.2rem;
    color: var(--ink-mute);
    font-style: italic;
  }
  .team-label {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 1.35rem;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .opponent-input {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 1.35rem;
    border: 0;
    background: transparent;
    color: var(--ink);
    padding: 2px 6px;
    border-bottom: 1px solid var(--line);
    min-width: 100px;
    width: auto;
    max-width: 100%;
    outline: none;
    letter-spacing: -0.01em;
  }
  .opponent-input:focus { border-bottom-color: var(--gold); }
  .opponent-input::placeholder { color: var(--ink-mute); font-style: italic; }

  .match-result {
    text-align: right;
    flex-shrink: 0;
  }
  .result-sets {
    font-family: 'Fraunces', serif;
    font-size: 2rem;
    font-weight: 500;
    letter-spacing: -0.02em;
    display: flex;
    align-items: baseline;
    gap: 6px;
    line-height: 1;
  }
  .result-sets .dash {
    color: var(--ink-mute);
    font-size: 1.2rem;
    font-weight: 300;
  }
  .result-sets .our { color: var(--ink); }
  .result-sets .their { color: var(--ink-mute); }
  .result-status {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-weight: 600;
    margin-top: 0.25rem;
  }
  .result-status.win { color: var(--win); }
  .result-status.loss { color: var(--loss); }
  .result-status.tie { color: var(--tie); }
  .result-status.pending { color: var(--ink-mute); font-weight: 500; }

  .btn-icon {
    border: 0;
    background: transparent;
    color: var(--ink-mute);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.78rem;
  }
  .btn-icon:hover { background: rgba(255,255,255,0.06); color: var(--ink); }

  /* ───── Scoresheet table ───── */
  .scoresheet-wrap {
    margin: 0 -1.75rem;
    padding: 0 1.75rem;
    overflow-x: auto;
  }
  @media (max-width: 600px) {
    .scoresheet-wrap { margin: 0 -1rem; padding: 0 1rem; }
  }
  table.scoresheet {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    min-width: 620px;
  }
  table.scoresheet th {
    font-family: 'Manrope', sans-serif;
    font-weight: 600;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-mute);
    padding: 0.5rem 0.3rem;
    text-align: center;
    border-bottom: 1px solid var(--line);
  }
  table.scoresheet th.archer-th {
    color: var(--ink);
    font-weight: 700;
    font-size: 0.78rem;
    letter-spacing: 0.05em;
    padding-bottom: 0.7rem;
  }

  table.scoresheet td {
    padding: 3px 2px;
    text-align: center;
    vertical-align: middle;
  }
  table.scoresheet tr.volley-row:not(:last-child) td {
    border-bottom: 1px solid var(--line-soft);
  }
  table.scoresheet td.volley-num {
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 500;
    color: var(--ink-mute);
    padding-right: 0.6rem;
    width: 28px;
  }
  td.arrow-cell { width: 36px; padding: 4px 1px; }
  td.arrow-cell.second { padding-right: 8px; }
  td.sep { width: 6px; border-left: 1px dashed var(--line-soft); }

  .arrow-input {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1.5px solid var(--line);
    background: var(--bg);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88rem;
    font-weight: 600;
    text-align: center;
    color: var(--ink);
    outline: none;
    transition: all 0.12s;
    padding: 0;
    -webkit-appearance: none;
    appearance: none;
    cursor: pointer;
    caret-color: transparent;
  }
  .arrow-input:hover {
    border-color: var(--ink-soft);
    transform: scale(1.05);
  }
  .arrow-input:active { transform: scale(0.95); }
  .arrow-input:focus {
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(224,176,72,0.18);
  }

  /* Arrow color states mapped to target rings */
  .arrow-input.filled-x { background: #d9a838; border-color: #f2cc66; color: #1f1505; font-weight: 700; }
  .arrow-input.filled-x::after { content: ''; }
  .arrow-input.filled-10 { background: #3f2e10; border-color: var(--gold); color: #f0cc6a; }
  .arrow-input.filled-9 { background: #2e230e; border-color: var(--gold-soft); color: #d9b048; }
  .arrow-input.filled-r { background: #4a2020; border-color: var(--red); color: #f0a0a0; }
  .arrow-input.filled-b { background: #1a2e4e; border-color: #5a8ed0; color: #a6c6ec; }
  .arrow-input.filled-k { background: var(--black-bg); border-color: #5a6076; color: var(--black-c); }
  .arrow-input.filled-w { background: var(--white-c); border-color: var(--white-border); color: #2a2618; }
  .arrow-input.filled-m { background: transparent; border-color: var(--miss); color: var(--miss); font-style: italic; }

  .arrow-input.blocked {
    opacity: 0.3;
    cursor: not-allowed;
    border-style: dashed;
  }
  .arrow-input.blocked:hover { transform: none; border-color: var(--line); }

  td.volley-total {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    font-size: 0.95rem;
    padding: 0 0.8rem;
    color: var(--ink);
  }
  td.volley-total.tiny { font-size: 0.8rem; color: var(--ink-mute); font-weight: 400;}
  td.adv-cell {
    padding: 4px 4px;
  }
  .adv-input {
    width: 48px;
    height: 30px;
    border: 1px solid var(--line);
    border-radius: 4px;
    background: transparent;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88rem;
    font-weight: 600;
    text-align: center;
    color: var(--ink);
    outline: none;
    padding: 0;
  }
  .adv-input:focus { border-color: var(--ink); background: var(--bg); }
  .adv-input::placeholder { color: transparent; }

  td.setpts {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    padding: 0 0.5rem;
    width: 48px;
  }
  .setpt-pair {
    display: inline-flex;
    align-items: baseline;
    gap: 2px;
    font-weight: 600;
  }
  .setpt-pair .our {
    padding: 2px 6px;
    border-radius: 3px;
  }
  .setpt-pair .their {
    padding: 2px 6px;
    border-radius: 3px;
  }
  .setpt-pair .our.win-cell { background: var(--win); color: white; }
  .setpt-pair .their.win-cell { background: var(--loss); color: white; }
  .setpt-pair .tie-cell { background: var(--tie); color: white; }
  .setpt-pair .zero { color: var(--ink-mute); font-weight: 400; }
  .poulie-cumul { font-weight: 600; color: var(--ink); font-family: 'JetBrains Mono', monospace; }

  tr.totals-row td {
    padding-top: 0.8rem;
    border-top: 2px solid var(--ink);
  }
  tr.totals-row .label {
    font-family: 'Manrope', sans-serif;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ink-mute);
    font-weight: 600;
    text-align: right;
    padding-right: 0.8rem;
  }
  tr.totals-row .archer-total {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--ink);
  }
  tr.totals-row .archer-avg {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--ink-mute);
    font-weight: 400;
    padding-top: 2px;
  }

  /* ───── Per-match stats (below scoresheet) ───── */
  .match-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--line-soft);
  }
  @media (max-width: 700px) {
    .match-stats { grid-template-columns: repeat(2, 1fr); }
  }
  .archer-card {
    padding: 0.8rem 0.9rem;
    border: 1px solid var(--line-soft);
    border-radius: 4px;
    background: var(--bg);
  }
  .archer-card .name {
    font-family: 'Fraunces', serif;
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 0.4rem;
    letter-spacing: -0.01em;
  }
  .archer-card .stats-row {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.74rem;
    color: var(--ink-mute);
    padding: 2px 0;
  }
  .archer-card .stats-row strong {
    color: var(--ink);
    font-weight: 600;
  }

  /* ───── Global stats view ───── */
  .global-view {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1.75rem 2rem;
  }
  @media (max-width: 600px) {
    .global-view { padding: 1.25rem; }
  }
  .global-view h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 1.5rem;
    margin-bottom: 1.25rem;
    letter-spacing: -0.02em;
  }
  .global-section {
    margin-bottom: 2rem;
  }
  .global-section h3 {
    font-family: 'Manrope', sans-serif;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-mute);
    font-weight: 600;
    margin-bottom: 0.75rem;
  }
  .archer-ranking {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 0.75rem;
  }
  .rank-card {
    padding: 1rem 1.1rem;
    border: 1px solid var(--line-soft);
    border-radius: 4px;
    background: var(--bg);
  }
  .rank-card .rank-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 0.5rem;
  }
  .rank-card .rank-head .name {
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    font-weight: 600;
  }
  .rank-card .rank-head .avg {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--ink);
  }
  .rank-card .rank-bar {
    height: 4px;
    background: var(--line-soft);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 0.5rem;
  }
  .rank-card .rank-bar-fill {
    height: 100%;
    background: var(--gold);
    transition: width 0.4s;
  }
  .rank-card .rank-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--ink-mute);
    display: flex;
    justify-content: space-between;
  }

  /* Score distribution table */
  .score-dist-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
  }
  .score-dist-table th {
    font-family: 'Manrope', sans-serif;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-mute);
    font-weight: 600;
    padding: 0.5rem 0.4rem;
    text-align: center;
    border-bottom: 1px solid var(--line);
  }
  .score-dist-table th:first-child { text-align: left; }
  .score-dist-table td {
    padding: 0.4rem 0.4rem;
    border-bottom: 1px solid var(--line-soft);
    text-align: center;
  }
  .score-dist-table td:first-child {
    text-align: left;
    font-family: 'Manrope', sans-serif;
    font-weight: 500;
    font-size: 0.82rem;
  }
  .score-dist-table td.total-col {
    font-weight: 600;
    color: var(--ink);
  }
  .score-dist-table tr.total-row td {
    border-top: 1px solid var(--ink);
    border-bottom: 0;
    padding-top: 0.5rem;
    font-weight: 600;
  }
  .score-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .score-swatch {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1px solid var(--line);
    flex-shrink: 0;
  }
  .score-swatch.gold { background: #3f2e10; border-color: var(--gold); }
  .score-swatch.gold-in { background: #d9a838; border-color: #f2cc66; }
  .score-swatch.red { background: #4a2020; border-color: var(--red); }
  .score-swatch.blue { background: #1a2e4e; border-color: #5a8ed0; }
  .score-swatch.black { background: var(--black-bg); border-color: #5a6076; }
  .score-swatch.white { background: var(--white-c); border-color: var(--white-border); }
  .score-swatch.miss { background: transparent; border-color: var(--miss); }

  /* Color bar chart */
  .color-bars {
    display: flex;
    flex-direction: column;
    gap: 0.45rem;
  }
  .color-bar-row {
    display: grid;
    grid-template-columns: 80px 1fr 50px;
    align-items: center;
    gap: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
  }
  .color-bar-row .label {
    font-family: 'Manrope', sans-serif;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.82rem;
  }
  .color-bar {
    display: flex;
    height: 20px;
    border-radius: 2px;
    overflow: hidden;
    background: var(--line-soft);
  }
  .color-bar .seg {
    transition: flex 0.3s;
  }
  .color-bar .seg.seg-0 { background: #ff2d95; }
  .color-bar .seg.seg-1 { background: #00c853; }
  .color-bar .seg.seg-2 { background: #00e5ff; }
  .color-bar .seg.seg-3 { background: #ff9100; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--ink-mute);
  }
  .empty-state .display {
    font-size: 1.2rem;
    color: var(--ink-soft);
    margin-bottom: 0.4rem;
  }
  .empty-state .hint {
    font-size: 0.85rem;
  }

  /* ───── Modal ───── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(4,7,14,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 1rem;
    animation: fadeIn 0.15s;
  }
  .modal {
    background: var(--paper);
    border-radius: 6px;
    padding: 1.5rem;
    max-width: 420px;
    width: 100%;
    border: 1px solid var(--line);
  }
  .modal h3 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 1.2rem;
    margin-bottom: 1rem;
    letter-spacing: -0.01em;
  }
  .modal input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.95rem;
    background: var(--bg);
    color: var(--ink);
    margin-bottom: 1rem;
    outline: none;
  }
  .modal input::placeholder { color: var(--ink-mute); }
  .modal input:focus { border-color: var(--gold); }
  .modal-actions {
    display: flex;
    gap: 0.5rem;
    justify-content: flex-end;
  }
  .btn {
    padding: 7px 14px;
    border: 1px solid var(--line);
    background: transparent;
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    font-weight: 500;
    color: var(--ink);
  }
  .btn:hover { border-color: var(--ink-soft); }
  .btn.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .btn.primary:hover { background: #fff; }
  .btn.danger { color: var(--loss); border-color: var(--loss); }
  .btn.danger:hover { background: var(--red-bg); }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .hidden { display: none !important; }

  /* Spectator mode: hide all edit affordances */
  body.spectator .btn-add-match,
  body.spectator .fab-target,
  body.spectator #btn-delete-match,
  body.spectator .btn#btn-import,
  body.spectator .btn#btn-reset,
  body.spectator .disc-tab-add,
  body.spectator .team-chip-add,
  body.spectator .team-chip .edit { display: none !important; }
  body.spectator .input-hint.coach-hint { display: none; }

  /* ───── Grouping view ───── */
  .grouping-view {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1.5rem 1.75rem;
  }
  @media (max-width: 600px) {
    .grouping-view { padding: 1rem 0.8rem; }
  }
  .grouping-view h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 1.5rem;
    margin-bottom: 0.25rem;
    letter-spacing: -0.02em;
  }
  .grouping-subtitle {
    font-size: 0.85rem;
    color: var(--ink-mute);
    margin-bottom: 1rem;
  }
  .grouping-scope {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 1.25rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--line-soft);
  }
  .grouping-scope label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ink-mute);
    font-weight: 600;
    margin-right: 0.25rem;
  }
  .grouping-scope select {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 6px 10px;
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.85rem;
    outline: none;
    cursor: pointer;
    max-width: 100%;
  }
  .grouping-scope select:focus { border-color: var(--gold); }
  .grouping-scope-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--ink-mute);
    margin-left: auto;
  }
  .grouping-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
  }
  @media (max-width: 1100px) {
    .grouping-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 500px) {
    .grouping-grid { grid-template-columns: 1fr; gap: 1.2rem; }
  }
  .archer-target-card {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    padding: 0.8rem;
    border: 1px solid var(--line-soft);
    border-radius: 4px;
    background: var(--bg);
  }
  .archer-target-card .head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 0.5rem;
  }
  .archer-target-card .name {
    font-family: 'Fraunces', serif;
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .archer-target-card .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--ink-mute);
  }
  .archer-target-card .target-box {
    aspect-ratio: 1;
    width: 100%;
    position: relative;
    background: transparent;
  }
  .archer-target-card .target-box svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .archer-target-card .no-data {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    color: var(--ink-mute);
    font-size: 0.78rem;
    padding: 1rem;
    pointer-events: none;
    gap: 0.3rem;
  }
  .archer-target-card .no-data .no-data-main {
    font-family: 'Fraunces', serif;
    font-size: 0.95rem;
    color: var(--ink-soft);
  }
  .archer-target-card .footer-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px 8px;
    padding-top: 0.5rem;
    border-top: 1px solid var(--line-soft);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
  }
  .archer-target-card .footer-stats .cell {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .archer-target-card .footer-stats .cell .lbl {
    font-family: 'Manrope', sans-serif;
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-mute);
    font-weight: 600;
  }
  .archer-target-card .footer-stats .cell .val {
    color: var(--ink);
    font-weight: 600;
    font-size: 0.88rem;
  }
  .mpi-marker {
    fill: none;
    stroke: #fff;
    stroke-width: 2;
  }
  .mpi-marker-inner {
    fill: #fff;
  }

  /* ───── Substitute (non-shooter) cells ───── */
  td.sub-cell {
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 4px,
      var(--line-soft) 4px,
      var(--line-soft) 5px
    );
  }
  .sub-dash {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1.5px dashed var(--line);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-mute);
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem;
    margin: 0 auto;
    background: transparent;
  }
  .volley-num-btn {
    background: transparent;
    border: 0;
    font-family: 'Fraunces', serif;
    font-size: 1rem;
    font-weight: 500;
    color: var(--ink-mute);
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 4px;
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0;
    line-height: 1;
  }
  .volley-num-btn:hover {
    background: rgba(255,255,255,0.04);
    color: var(--ink);
  }
  .sub-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.58rem;
    font-weight: 600;
    color: var(--ink-mute);
    letter-spacing: 0.04em;
    margin-top: 1px;
    padding: 1px 4px;
    border-radius: 2px;
    background: var(--line-soft);
  }
  .sub-badge.barrage-badge {
    background: var(--gold);
    color: #1f1505;
    letter-spacing: 0.08em;
    font-size: 0.54rem;
  }
  .barrage-dash { opacity: 0.4; }

  /* Popover for setting sub */
  td.volley-num { position: relative; }
  .sub-popover {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    z-index: 40;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 0.7rem 0.8rem;
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    min-width: 240px;
    animation: fadeIn 0.1s;
  }
  .popover-title {
    font-size: 0.72rem;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 600;
    margin-bottom: 0.5rem;
    white-space: nowrap;
  }
  .popover-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .sub-chip {
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--ink-soft);
    padding: 5px 10px;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 500;
    transition: all 0.1s;
  }
  .sub-chip:hover {
    border-color: var(--ink-soft);
    color: var(--ink);
  }
  .sub-chip.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .sub-chip.clear {
    font-style: italic;
  }

  /* ───── Target input modal ───── */
  .target-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(4,7,14,0.75);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    animation: fadeIn 0.12s;
  }
  .target-modal {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 8px;
    width: 100%;
    max-width: 520px;
    max-height: 96vh;
    overflow-y: auto;
    padding: 1.2rem 1.2rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }
  .target-modal-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 1rem;
  }
  .target-modal-head .who {
    font-family: 'Fraunces', serif;
    font-size: 1.15rem;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .target-modal-head .when {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .target-close {
    background: transparent;
    border: 0;
    color: var(--ink-mute);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 2px 8px;
    line-height: 1;
  }
  .target-close:hover { color: var(--ink); }

  .target-wrap {
    position: relative;
    aspect-ratio: 1;
    max-width: 420px;
    margin: 0 auto;
    width: 100%;
    touch-action: manipulation;
    user-select: none;
  }
  .target-svg {
    width: 100%;
    height: 100%;
    display: block;
    cursor: crosshair;
  }
  .target-marker {
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .target-readout {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    padding: 0.4rem 0.2rem;
  }
  .target-readout .pending-score {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2rem;
    font-weight: 700;
    color: var(--ink);
    min-width: 3ch;
    text-align: center;
  }
  .target-readout .pending-label {
    font-size: 0.72rem;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 600;
  }
  .target-readout-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--ink-soft);
  }

  .target-actions {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .target-actions button {
    flex: 1;
    min-width: 70px;
    padding: 10px 8px;
    border: 1px solid var(--line);
    background: transparent;
    border-radius: 5px;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.1s;
  }
  .target-actions button:hover {
    border-color: var(--ink-soft);
    background: var(--bg);
  }
  .target-actions button.primary {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .target-actions button.primary:hover { background: #fff; }
  .target-actions button.miss { color: var(--miss); border-color: var(--miss); }
  .target-actions button.miss:hover { background: rgba(214,112,112,0.1); }
  .target-actions button[disabled] { opacity: 0.4; cursor: not-allowed; }

  /* Shot trail (recent arrows placed via target) */
  .target-trail {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    min-height: 28px;
    padding: 0.3rem 0.2rem;
    border-top: 1px solid var(--line-soft);
    border-bottom: 1px solid var(--line-soft);
  }
  .target-trail .trail-item {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--ink-soft);
  }
  .target-trail .trail-item.current {
    background: var(--gold-bg);
    border-color: var(--gold);
    color: #f0cc6a;
  }

  /* FAB to trigger target mode */
  .fab-target {
    position: fixed;
    bottom: 1.2rem;
    right: 1.2rem;
    z-index: 30;
    background: var(--ink);
    color: var(--paper);
    border: 0;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.3rem;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .fab-target:hover { transform: scale(1.05); }
  .fab-target svg { width: 28px; height: 28px; }

  /* Mobile responsive enhancements */
  @media (max-width: 700px) {
    html, body { font-size: 14px; }
    header.app-header {
      padding: 0.85rem 1rem 0;
      position: static;          /* ne reste plus collé en haut sur mobile */
      width: 100%;
      box-sizing: border-box;
    }
    .brand h1 { font-size: 1.4rem; }
    .brand .subtitle { font-size: 0.68rem; }
    .view-toggle button { padding: 5px 12px; font-size: 0.76rem; }
    .comp-tabs { gap: 1.3rem; }
    .comp-tab { font-size: 0.98rem; padding: 0.5rem 0 0.65rem; }
    .disc-tabs { gap: 1rem; margin: 0 -1rem; padding: 0.3rem 1rem 0; }
    .team-tabs { gap: 0.4rem; margin: 0 -1rem; padding: 0.45rem 1rem 0.1rem; }
    .comp-tabs { margin: 0 -1rem; padding: 0 1rem; }

    /* Tableau de match — colonnes V plus étroites, cercles de flèches un peu plus gros */
    table.scoresheet td.volley-num { width: 20px; padding-right: 0.3rem; font-size: 0.82rem; }
    .volley-num-btn { font-size: 0.82rem; padding: 3px 4px; }
    td.arrow-cell { width: 40px; padding: 5px 1px; }
    .arrow-input { width: 38px; height: 38px; font-size: 0.94rem; }

    main { padding: 0.8rem; gap: 0.8rem; }

    aside.matches-panel {
      max-height: none;
      order: 2;
    }
    #match-view { order: 1; }

    .matches-list {
      flex-direction: row;
      flex-wrap: nowrap;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 4px;
      gap: 5px;
    }
    .matches-list::-webkit-scrollbar { display: none; }
    .match-item {
      flex-direction: column;
      align-items: flex-start;
      min-width: 130px;
      border-left: 0;
      border-bottom: 3px solid transparent;
      padding: 8px 10px;
    }
    .match-item.active {
      border-left: 0;
      border-bottom-color: var(--gold);
    }

    .match-content { padding: 0.8rem 0.7rem; }
    .match-header { flex-direction: column; gap: 0.7rem; }
    .match-result { text-align: left; align-self: flex-start; }
    .result-sets { font-size: 1.6rem; }

    .scoresheet-wrap { margin: 0 -0.7rem; padding: 0 0.7rem; }
    table.scoresheet { min-width: 540px; }

    .match-stats { grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .archer-card { padding: 0.6rem 0.7rem; }

    .global-view { padding: 1rem 0.8rem; }
    .global-view h2 { font-size: 1.25rem; }
    .archer-ranking { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
    .rank-card { padding: 0.7rem 0.8rem; }

<div class="saving-indicator" id="saving-indicator">sauvegardé</div>

<script>
// ╔═══════════════════════════════════════════════════════════╗
// ║  CONFIGURATION DU CLUB — modifie uniquement ce bloc.       ║
// ║  C'est ici que tu personnalises l'application pour TON     ║
// ║  club avant de la partager. (La config Firebase se trouve  ║
// ║  plus bas, cherche « FIREBASE_CONFIG ».)                   ║
// ╚═══════════════════════════════════════════════════════════╝
const APP_CONFIG = {
  // Nom affiché en haut de la page (sous-titre).
  clubName: 'Nom de votre club · Saison 2026',
  // Titre de l'onglet du navigateur.
  pageTitle: 'Suivi de match — Tir à l\'arc'
  // Le mot de passe coach n'est PLUS dans le code : la connexion se fait
  // via Firebase Authentication (comptes créés dans la console Firebase).
  // Voir la section « Sécurité » du README.
};

// Applique le nom du club et le titre de la page au chargement.
function applyAppConfig() {
  try { document.title = APP_CONFIG.pageTitle; } catch (e) {}
  const sub = document.getElementById('app-subtitle');
  if (sub) sub.textContent = APP_CONFIG.clubName;
}

// ───────────────────────────────────────────────────────────
// Data model & storage
// ───────────────────────────────────────────────────────────
// Default roster for the historical team (extérieur, femme classique, 70m).
// Each team now stores its own editable roster — these names are only the seed.
// Noms d'archers par défaut, utilisés UNIQUEMENT pour amorcer une base vide
// (premier lancement d'un nouveau club) et comme filet de secours si une équipe
// se retrouve sans archers. Chaque club renomme ensuite ses archers dans l'app.
const DEFAULT_ARCHERS = ['Archère 1', 'Archère 2', 'Archère 3', 'Archère 4'];
// Couleur par archer (index 0..3) pour les impacts sur la cible et les barres.
// Teintes vives et bien séparées entre elles, et qui ressortent sur les anneaux
// (or / rouge / bleu / noir) grâce au liseré blanc autour de chaque point.
const SEG_COLORS = ['#ff2d95', '#00c853', '#00e5ff', '#ff9100'];
// Catalogue des types d'équipe : genre (F/M) + arme (classique/poulie).
// Classique et poulie partagent le MÊME format de match (3 archers tireurs
// + 1 remplaçant par volée, 5 volées de 2 flèches, barrage si égalité). L'arme
// est conservée pour l'affichage ; le genre pilote les libellés « archère »/« archer ».
const TEAM_TYPES = [
  { name: 'Femme classique', gender: 'F', bow: 'classique' },
  { name: 'Homme classique', gender: 'M', bow: 'classique' },
  { name: 'Femme poulie',    gender: 'F', bow: 'poulie' },
  { name: 'Homme poulie',    gender: 'M', bow: 'poulie' }
];
function teamTypeByName(n) { return TEAM_TYPES.find(t => t.name === n) || null; }
const STORAGE_KEY = 'd1_2026_data';

// Compétitions/rencontres par défaut pour amorcer une base vide.
// Laissé VIDE volontairement : un nouveau club démarre sur une page blanche
// et crée ses propres compétitions et matchs directement dans l'application
// (bouton « + Ajouter »). Pour pré-remplir des rencontres, ajoute des entrées
// au format  'Nom de la compétition': ['Adversaire 1', 'Adversaire 2', …].
const DEFAULT_MATCHES = {};

function emptyVolley() {
  return {
    arrows: [[null,null],[null,null],[null,null],[null,null]],
    positions: [[null,null],[null,null],[null,null],[null,null]],
    subs: [false, false, false, false],
    barrage: false,
    adv: null
  };
}
function emptyMatch(opponent) {
  const volees = [emptyVolley(), emptyVolley(), emptyVolley(), emptyVolley(), emptyVolley()];
  volees[4].barrage = true;   // Volley 5 is always the shoot-off: 3 archers × 1 arrow
  return {
    id: 'm_' + Math.random().toString(36).slice(2, 10),
    opponent: opponent || '',
    volees: volees
  };
}

// Helper: number of arrow slots per archer in a volley (2 normally, 1 in barrage)
function numArrowSlots(v) { return v && v.barrage ? 1 : 2; }

// Helper: can this archer shoot in this volley?
// Rule: max 3 archers per volley. Substituted archer can't. If she already
// has arrows, yes. Otherwise, only if fewer than 3 others already have arrows.
function canArcherShoot(volley, archerIdx) {
  const subs = volley.subs || [false, false, false, false];
  if (subs[archerIdx]) return false;
  const hasOwn = volley.arrows[archerIdx].some(a => arrowIsSet(a));
  if (hasOwn) return true;
  let othersWithArrows = 0;
  for (let ai = 0; ai < 4; ai++) {
    if (ai === archerIdx) continue;
    if (volley.arrows[ai].some(a => arrowIsSet(a))) othersWithArrows++;
  }
  return othersWithArrows < 3;
}
function defaultState() {
  const comps = {};
  for (const [compName, opponents] of Object.entries(DEFAULT_MATCHES)) {
    comps[compName] = { matches: opponents.map(o => emptyMatch(o)) };
  }
  // New hierarchy: Disciplines → Équipes → Compétitions → Matches.
  // The historical data is the outdoor (extérieur) 70m women's recurve team.
  return {
    disciplines: {
      'Extérieur': {
        teamOrder: ['Femme classique'],
        teams: {
          'Femme classique': {
            archers: [...DEFAULT_ARCHERS],
            gender: 'F',
            bow: 'classique',
            // Format de match commun au classique et au poulie (set-points,
            // 5 volées de 2 flèches, barrage si égalité).
            format: 'classique',
            compOrder: Object.keys(DEFAULT_MATCHES),
            competitions: comps
          }
        }
      }
    },
    disciplineOrder: ['Extérieur']
  };
}

// ─── Accessors for the active discipline / team / competitions ──
function getActiveDiscipline() {
  return state.disciplines ? (state.disciplines[ui.activeDiscipline] || null) : null;
}
function getActiveTeam() {
  const d = getActiveDiscipline();
  return d && d.teams ? (d.teams[ui.activeTeam] || null) : null;
}
function getComps() { const t = getActiveTeam(); return t ? (t.competitions || {}) : {}; }
function getCompOrder() { const t = getActiveTeam(); return t ? (t.compOrder || []) : []; }
function getArchers() { const t = getActiveTeam(); return t && t.archers && t.archers.length ? t.archers : [...DEFAULT_ARCHERS]; }
function numArchers() { return getArchers().length; }
// Short label for an archer name: "Marie" → "Mar.", "Bo" → "Bo".
function shortArcherName(name) {
  const n = (name || '').trim();
  if (!n) return '—';
  return n.length <= 4 ? n : (n.slice(0, 3) + '.');
}
// ─── Gendered labels (archère/archer …) driven by the team's gender ──
function genderForTeam(team, name) {
  if (team && (team.gender === 'F' || team.gender === 'M')) return team.gender;
  return /homme/i.test(name || '') ? 'M' : 'F';
}
function activeGender() { return genderForTeam(getActiveTeam(), ui.activeTeam); }
// ─── Arme de l'équipe (classique = sets, poulie = cumul de points) ──
function bowForTeam(team, name) {
  if (team && (team.bow === 'classique' || team.bow === 'poulie')) return team.bow;
  return /poulie/i.test(name || '') ? 'poulie' : 'classique';
}
function bowForMatch(match) {
  // A match carries its team's bow via the active team context. When iterating
  // matches outside the active team (global view), the caller passes the team.
  return bowForTeam(getActiveTeam(), ui.activeTeam);
}
function nArcher(gender, plural, cap) {
  let w = gender === 'M' ? 'archer' : 'archère';
  if (plural) w += 's';
  return cap ? (w.charAt(0).toUpperCase() + w.slice(1)) : w;
}
function nSub(gender) { return gender === 'M' ? 'remplaçant' : 'remplaçante'; }
function nNonShooter(gender, cap) {
  const w = gender === 'M' ? 'non-tireur' : 'non-tireuse';
  return cap ? (w.charAt(0).toUpperCase() + w.slice(1)) : w;
}
function nAllShoot(gender) { return gender === 'M' ? 'Tous tirent' : 'Toutes tirent'; }

// UI preferences — LOCAL to each device, never synced.
// This keeps the "which view / which match" choice independent per user.
const UI_KEY = 'd1_2026_ui';
function defaultUi() {
  return {
    activeDiscipline: 'Extérieur',
    activeTeam: 'Femme classique',
    activeComp: null,        // Résolu vers la première compétition existante au boot
    activeMatchId: null,     // Will be resolved to first match at boot
    view: 'match',
    groupingScope: 'current'
  };
}

let state = defaultState();
let ui = defaultUi();
let saveTimer = null;
let openPopoverV = null;         // Index of volley whose sub-popover is open, or null
let targetState = null;          // { v, a, i } when target modal is open, else null
let targetHistory = [];          // Recent arrows entered via target, for undo trail

// ─── Mode coach / spectateur ──────────────────────────────────
// Par défaut, l'app s'ouvre en mode spectateur (lecture seule).
// Pour passer en mode coach (saisie activée), clique sur 🔒 en haut et
// entre le mot de passe. Il est mémorisé localement sur l'appareil.
// ─── Authentification coach (Firebase Auth) ───────────────────
// Les visiteurs voient les scores en LECTURE SEULE (mode spectateur).
// Seuls les comptes coach — créés dans la console Firebase → Authentication —
// peuvent se connecter (email + mot de passe) pour saisir les scores.
// La vraie protection vient de la règle Firestore
//   « allow write: if request.auth != null »
// qui empêche, CÔTÉ SERVEUR, toute écriture sans être connecté. Le mode
// spectateur n'est donc plus une simple barrière visuelle.
let firebaseAuth = null;     // Instance Firebase Auth (définie dans initFirebase)
let currentUser = null;      // Utilisateur connecté, ou null
let isCoach = false;         // Vrai uniquement si un coach est authentifié
function READ_ONLY() { return !isCoach; }

function applyCoachMode() {
  if (isCoach) {
    document.body.classList.remove('spectator');
  } else {
    document.body.classList.add('spectator');
  }
  const btn = document.getElementById('mode-toggle');
  if (btn) {
    if (isCoach) {
      btn.textContent = '✓ Coach';
      btn.classList.add('coach');
      btn.title = 'Cliquer pour repasser en mode spectateur';
    } else {
      btn.textContent = '🔒 Spectateur';
      btn.classList.remove('coach');
      btn.title = 'Cliquer pour passer en mode coach';
    }
  }
}

function toggleCoachMode(e) {
  if (e) { e.preventDefault(); e.stopPropagation(); }
  if (isCoach) {
    // Lock back down — use showModal for consistency
    showCoachLockModal();
  } else {
    showCoachUnlockModal();
  }
}

function showCoachUnlockModal() {
  // Guard: remove any pre-existing overlay
  document.querySelectorAll('.coach-modal-overlay').forEach(el => el.remove());

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay coach-modal-overlay';
  overlay.innerHTML = `
    <div class="modal" onclick="event.stopPropagation();">
      <h3>Mode coach</h3>
      <p style="font-size: 0.85rem; color: var(--ink-mute); margin-bottom: 0.75rem;">
        Connecte-toi avec ton compte coach pour activer la saisie.
      </p>
      <input type="email" id="coach-email-input" placeholder="Email" autocomplete="username" autocapitalize="off" style="margin-bottom: 0.5rem;">
      <input type="password" id="coach-pwd-input" placeholder="Mot de passe" autocomplete="current-password" autocapitalize="off">
      <div id="coach-error" style="font-size: 0.82rem; color: var(--loss); margin-top: 0.5rem; min-height: 1em;"></div>
      <div class="modal-actions">
        <button class="btn" id="coach-cancel">Annuler</button>
        <button class="btn primary" id="coach-ok">Se connecter</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const emailInput = overlay.querySelector('#coach-email-input');
  const input = overlay.querySelector('#coach-pwd-input');
  const errorEl = overlay.querySelector('#coach-error');
  const okBtn = overlay.querySelector('#coach-ok');
  emailInput.focus();

  const close = () => overlay.remove();

  const attempt = async () => {
    errorEl.textContent = '';
    if (!window._authSignIn) {
      errorEl.textContent = 'Connexion à Firebase en cours, réessaie dans un instant…';
      return;
    }
    const email = emailInput.value.trim();
    const pwd = input.value;
    if (!email || !pwd) { errorEl.textContent = 'Renseigne ton email et ton mot de passe.'; return; }
    okBtn.disabled = true;
    okBtn.textContent = 'Connexion…';
    try {
      await window._authSignIn(email, pwd);
      // onAuthStateChanged s'occupe de passer en mode coach + re-render.
      close();
      showToast('Mode coach activé — saisie disponible');
    } catch (err) {
      okBtn.disabled = false;
      okBtn.textContent = 'Se connecter';
      input.value = '';
      // Message générique : on ne révèle pas si c'est l'email ou le mdp.
      errorEl.textContent = 'Email ou mot de passe incorrect.';
      input.focus();
    }
  };

  overlay.querySelector('#coach-cancel').onclick = close;
  okBtn.onclick = attempt;
  const onKey = (e) => {
    if (e.key === 'Enter') attempt();
    else if (e.key === 'Escape') close();
  };
  emailInput.onkeydown = onKey;
  input.onkeydown = onKey;
  overlay.onclick = (e) => { if (e.target === overlay) close(); };
}

function showCoachLockModal() {
  document.querySelectorAll('.coach-modal-overlay').forEach(el => el.remove());

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay coach-modal-overlay';
  overlay.innerHTML = `
    <div class="modal" onclick="event.stopPropagation();">
      <h3>Se déconnecter ?</h3>
      <p style="font-size: 0.9rem; color: var(--ink-soft); margin-bottom: 1rem;">
        La saisie sera désactivée et tu repasseras en mode spectateur. Tu pourras te
        reconnecter avec ton compte coach à tout moment.
      </p>
      <div class="modal-actions">
        <button class="btn" id="coach-lock-cancel">Annuler</button>
        <button class="btn primary" id="coach-lock-ok">Se déconnecter</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  const close = () => overlay.remove();

  overlay.querySelector('#coach-lock-cancel').onclick = close;
  overlay.querySelector('#coach-lock-ok').onclick = async () => {
    try { if (window._authSignOut) await window._authSignOut(); } catch (e) {}
    // onAuthStateChanged repassera isCoach à false + re-render.
    close();
    showToast('Mode spectateur activé');
  };
  overlay.onclick = (e) => { if (e.target === overlay) close(); };
}

// ─── Firebase Firestore: shared live storage ───────────────────
// A single 'team' document holds the whole state. Every client listens to
// it in real-time, so saving on one device updates the others within a second.
// localStorage stays as a cache — last known state shown immediately at load,
// then replaced by whatever Firestore pushes.
const FIREBASE_CONFIG = {
  apiKey: "VOTRE_API_KEY",
  authDomain: "VOTRE_PROJET.firebaseapp.com",
  projectId: "VOTRE_PROJET",
  storageBucket: "VOTRE_PROJET.firebasestorage.app",
  messagingSenderId: "VOTRE_SENDER_ID",
  appId: "VOTRE_APP_ID"
};
const TEAM_ID = 'equipe-principale';   // Nom du document partagé dans Firestore.
                                       // Change-le pour faire tourner plusieurs
                                       // instances séparées sur le même projet.

let firebaseApp = null;
let firestoreDb = null;
let teamDocRef = null;
let firestoreUnsubscribe = null;
let isApplyingRemote = false;  // Guard to skip echo-save when we get our own write back
let lastLocalPayload = null;   // Last JSON we wrote — used to compare incoming snapshots
let firestoreReady = false;

async function initFirebase() {
  try {
    const appMod = await import('https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js');
    const fsMod = await import('https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js');
    const authMod = await import('https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js');
    firebaseApp = appMod.initializeApp(FIREBASE_CONFIG);
    firestoreDb = fsMod.getFirestore(firebaseApp);

    // ─── Auth : suit l'état de connexion du coach ───
    firebaseAuth = authMod.getAuth(firebaseApp);
    // Expose les fonctions de connexion/déconnexion pour les fenêtres modales.
    window._authSignIn = (email, pwd) => authMod.signInWithEmailAndPassword(firebaseAuth, email, pwd);
    window._authSignOut = () => authMod.signOut(firebaseAuth);
    // À chaque changement (connexion, déconnexion, ou session restaurée au
    // rechargement), on met à jour le mode coach/spectateur et on rafraîchit.
    authMod.onAuthStateChanged(firebaseAuth, (user) => {
      currentUser = user;
      isCoach = !!user;
      applyCoachMode();
      if (typeof render === 'function') render();
    });
    // Enable offline persistence — the SDK queues writes when network is down
    // and flushes them automatically when it comes back.
    try {
      await fsMod.enableIndexedDbPersistence(firestoreDb);
    } catch (persistErr) {
      // Another tab already has persistence, or browser doesn't support it.
      // Not fatal — online sync still works.
      console.warn('Firestore offline persistence unavailable:', persistErr.code);
    }
    teamDocRef = fsMod.doc(firestoreDb, 'teams', TEAM_ID);
    firestoreReady = true;
    setConnectionStatus('connecting');

    // Live listener
    firestoreUnsubscribe = fsMod.onSnapshot(teamDocRef, (snap) => {
      setConnectionStatus(snap.metadata.fromCache ? 'offline' : 'online');
      if (!snap.exists()) return;
      const data = snap.data();
      if (!data || !data.payload) return;
      const remotePayload = data.payload;
      // Ignore echoes of our own writes
      if (remotePayload === lastLocalPayload) return;
      try {
        const remoteState = JSON.parse(remotePayload);
        isApplyingRemote = true;
        state = { ...defaultState(), ...remoteState };
        migrateState();
        // If the match we were viewing got deleted on another device, or the
        // comp was renamed/removed, fall back to a valid one so we don't crash.
        resolveActiveMatch();
        // Cache locally too
        try { localStorage.setItem(STORAGE_KEY, remotePayload); } catch (e) {}
        lastLocalPayload = remotePayload;
        // Re-render current view (but don't re-open target modal etc.)
        if (typeof render === 'function') render();
        isApplyingRemote = false;
      } catch (e) {
        console.error('Bad remote payload:', e);
        isApplyingRemote = false;
      }
    }, (err) => {
      console.error('Firestore listener error:', err);
      setConnectionStatus('error');
    });

    // Also push current local state to Firestore the first time we connect,
    // if Firestore has nothing yet and we have local data to seed.
    // Une écriture n'est autorisée que pour un coach connecté (règles Firestore) ;
    // sinon le document sera créé à la première saisie d'un coach.
    const initialSnap = await fsMod.getDoc(teamDocRef);
    if (!initialSnap.exists() && firebaseAuth && firebaseAuth.currentUser) {
      await pushStateToFirestore();
    }

    // Keep a reference to setDoc for saveState
    window._fsSetDoc = fsMod.setDoc;
    window._fsServerTimestamp = fsMod.serverTimestamp;
  } catch (e) {
    console.error('Firebase init failed:', e);
    setConnectionStatus('error');
    firestoreReady = false;
  }
}

async function pushStateToFirestore() {
  if (!firestoreReady || !teamDocRef || !window._fsSetDoc) return false;
  const payload = JSON.stringify(state);
  lastLocalPayload = payload;
  try {
    await window._fsSetDoc(teamDocRef, {
      payload: payload,
      updatedAt: window._fsServerTimestamp()
    });
    return true;
  } catch (e) {
    console.error('Firestore write failed:', e);
    return false;
  }
}

function setConnectionStatus(status) {
  const el = document.getElementById('conn-status');
  if (!el) return;
  el.className = 'conn-status ' + status;
  const labels = {
    connecting: 'Connexion…',
    online: 'En ligne',
    offline: 'Hors ligne',
    error: 'Erreur',
    local: 'Local'
  };
  el.textContent = labels[status] || status;
}

async function loadState() {
  // Step 1: show cached local state immediately (zero-latency boot)
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const loaded = JSON.parse(raw);
      state = { ...defaultState(), ...loaded };
      migrateState();
      lastLocalPayload = raw;
    }
  } catch (e) {
    // Ignore — use default state
  }
  // Step 2: artifact storage fallback (when running inside the Claude artifact
  // where Firebase can't reach the internet). Only used if localStorage was empty.
  if (!lastLocalPayload) {
    try {
      if (typeof window.storage !== 'undefined') {
        const res = await window.storage.get(STORAGE_KEY);
        if (res && res.value) {
          const loaded = JSON.parse(res.value);
          state = { ...defaultState(), ...loaded };
          migrateState();
        }
      }
    } catch (e) {}
  }
  // Step 3: load local UI prefs (which view, which match — independent per device)
  loadUiPrefs();
  resolveActiveMatch();
  // Step 4: kick off Firebase (async — doesn't block initial render)
  initFirebase();  // no await on purpose
}

function loadUiPrefs() {
  try {
    const raw = localStorage.getItem(UI_KEY);
    if (raw) {
      const loaded = JSON.parse(raw);
      ui = { ...defaultUi(), ...loaded };
    }
  } catch (e) {
    // Use default ui
  }
}

function saveUiPrefs() {
  try {
    localStorage.setItem(UI_KEY, JSON.stringify(ui));
  } catch (e) {}
}

// Make sure the ui points at a real comp/match. Called after state load
// and after any remote update that could have deleted what we were looking at.
function resolveActiveMatch() {
  if (!state.disciplines) return;
  // Fix activeDiscipline if it no longer exists
  if (!state.disciplines[ui.activeDiscipline]) {
    ui.activeDiscipline = (state.disciplineOrder && state.disciplineOrder[0]) ||
                          Object.keys(state.disciplines)[0] || null;
  }
  const disc = getActiveDiscipline();
  if (!disc) return;
  // Fix activeTeam if it no longer exists in the active discipline
  if (!disc.teams || !disc.teams[ui.activeTeam]) {
    ui.activeTeam = (disc.teamOrder && disc.teamOrder[0]) ||
                    Object.keys(disc.teams || {})[0] || null;
  }
  const team = getActiveTeam();
  if (!team) return;
  // Fix activeComp if it no longer exists in the active team
  if (!team.competitions[ui.activeComp]) {
    ui.activeComp = (team.compOrder && team.compOrder[0]) ||
                    Object.keys(team.competitions)[0] || null;
  }
  const comp = team.competitions[ui.activeComp];
  if (!comp) { ui.activeMatchId = null; return; }
  // Fix activeMatchId if it no longer exists in the active comp
  const exists = comp.matches.some(m => m.id === ui.activeMatchId);
  if (!exists) {
    ui.activeMatchId = comp.matches.length > 0 ? comp.matches[0].id : null;
  }
}

function migrateState() {
  // ── Forward-migrate the old flat format {competitions, compOrder} into the
  //    new Disciplines → Équipes → Compétitions hierarchy. The historical data
  //    is the outdoor (extérieur) 70m women's recurve team — never discard it.
  if (state.competitions) {
    state.disciplines = {
      'Extérieur': {
        teamOrder: ['Femme classique'],
        teams: {
          'Femme classique': {
            archers: (state.archers && state.archers.length) ? state.archers : [...DEFAULT_ARCHERS],
            gender: 'F',
            bow: 'classique',
            format: 'classique',
            compOrder: state.compOrder || Object.keys(state.competitions),
            competitions: state.competitions
          }
        }
      }
    };
    state.disciplineOrder = ['Extérieur'];
    delete state.competitions;
    delete state.compOrder;
    delete state.archers;
  }
  if (!state.disciplines) state.disciplines = {};
  if (!state.disciplineOrder || !state.disciplineOrder.length) {
    state.disciplineOrder = Object.keys(state.disciplines);
  }

  // ── Per-team / per-volley structural backfill ──
  for (const dName in state.disciplines) {
    const disc = state.disciplines[dName];
    if (!disc.teams) disc.teams = {};
    if (!disc.teamOrder || !disc.teamOrder.length) disc.teamOrder = Object.keys(disc.teams);
    // Drop any team names left in teamOrder that no longer exist
    disc.teamOrder = disc.teamOrder.filter(n => disc.teams[n]);
    for (const k in disc.teams) if (!disc.teamOrder.includes(k)) disc.teamOrder.push(k);

    for (const tName in disc.teams) {
      const team = disc.teams[tName];
      if (!team.archers || !team.archers.length) team.archers = [...DEFAULT_ARCHERS];
      if (!team.format) team.format = 'classique';
      // Backfill genre / arme from the team-type catalogue (or infer from name).
      if (team.gender !== 'F' && team.gender !== 'M') {
        const tt = teamTypeByName(tName);
        team.gender = tt ? tt.gender : (/homme/i.test(tName) ? 'M' : 'F');
      }
      if (team.bow !== 'classique' && team.bow !== 'poulie') {
        const tt = teamTypeByName(tName);
        team.bow = tt ? tt.bow : (/poulie/i.test(tName) ? 'poulie' : 'classique');
      }
      if (!team.competitions) team.competitions = {};
      if (!team.compOrder || !team.compOrder.length) team.compOrder = Object.keys(team.competitions);
      team.compOrder = team.compOrder.filter(n => team.competitions[n]);
      for (const k in team.competitions) if (!team.compOrder.includes(k)) team.compOrder.push(k);

      for (const cName in team.competitions) {
        const comp = team.competitions[cName];
        if (!comp.matches) comp.matches = [];
        for (const match of comp.matches) {
          for (const v of match.volees) {
            if (!v.subs) v.subs = [false, false, false, false];
            if (!v.positions) v.positions = [[null,null],[null,null],[null,null],[null,null]];
            if (typeof v.barrage !== 'boolean') v.barrage = false;
          }
          // Volley 5 (index 4) is always a barrage (shoot-off)
          if (match.volees.length >= 5) match.volees[4].barrage = true;
        }
      }
    }
  }
}

async function saveState() {
  if (READ_ONLY()) return;        // Spectateur: n'écrit nulle part
  if (isApplyingRemote) return;   // Don't echo-save changes that came from Firestore

  const payload = JSON.stringify(state);

  // Always cache locally (fast, synchronous, works offline)
  try { localStorage.setItem(STORAGE_KEY, payload); } catch (e) {}
  // Artifact storage (Claude environment only)
  try {
    if (typeof window.storage !== 'undefined') {
      await window.storage.set(STORAGE_KEY, payload);
    }
  } catch (e) {}

  // Push to Firestore (the shared source of truth)
  if (firestoreReady) {
    pushStateToFirestore();  // fire-and-forget
  } else {
    setConnectionStatus('local');
  }

  showSaving();
}

function debouncedSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveState, 400);
}

function showSaving() {
  const el = document.getElementById('saving-indicator');
  if (el._toastLock) return;   // Don't override a visible toast
  el.textContent = 'sauvegardé';
  el.classList.remove('toast');
  el.classList.add('visible');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('visible'), 900);
}

function showToast(msg, ms = 3200) {
  const el = document.getElementById('saving-indicator');
  el.textContent = msg;
  el.classList.add('visible', 'toast');
  el._toastLock = true;
  clearTimeout(el._t);
  el._t = setTimeout(() => {
    el.classList.remove('visible', 'toast');
    el._toastLock = false;
    el.textContent = 'sauvegardé';
  }, ms);
}

// ───────────────────────────────────────────────────────────
// Arrow value logic
// ───────────────────────────────────────────────────────────
function arrowValue(a) {
  if (a === null || a === undefined || a === '') return null;
  const s = String(a).trim().toUpperCase();
  if (s === 'X') return 10;
  if (s === 'M') return 0;
  const n = Number(s);
  return isNaN(n) ? null : n;
}
function arrowIsSet(a) {
  return a !== null && a !== undefined && a !== '';
}
function arrowCategory(a) {
  if (!arrowIsSet(a)) return null;
  const s = String(a).trim().toUpperCase();
  if (s === 'X') return 'x';
  if (s === 'M') return 'm';
  const n = Number(s);
  if (isNaN(n)) return null;
  if (n === 10) return '10';
  if (n === 9) return '9';
  if (n >= 7) return 'r';  // red
  if (n >= 5) return 'b';  // blue
  if (n >= 3) return 'k';  // black
  if (n >= 1) return 'w';  // white
  return 'm';
}
function arrowColorGroup(a) {
  // For color distribution (Jaune/Rouge/Bleu/Noir/Blanc/Brosse)
  if (!arrowIsSet(a)) return null;
  const cat = arrowCategory(a);
  if (cat === 'x' || cat === '10' || cat === '9') return 'Jaune';
  if (cat === 'r') return 'Rouge';
  if (cat === 'b') return 'Bleu';
  if (cat === 'k') return 'Noir';
  if (cat === 'w') return 'Blanc';
  if (cat === 'm') return 'Brosse';
  return null;
}

function volleyTotal(v) {
  let t = 0;
  const maxI = numArrowSlots(v);
  for (const pair of v.arrows) {
    for (let i = 0; i < maxI; i++) {
      const val = arrowValue(pair[i]);
      if (val !== null) t += val;
    }
  }
  return t;
}
function volleyArrowCount(v) {
  let c = 0;
  const maxI = numArrowSlots(v);
  for (const pair of v.arrows) {
    for (let i = 0; i < maxI; i++) {
      if (arrowIsSet(pair[i])) c++;
    }
  }
  return c;
}
function volleyHasData(v) {
  return volleyArrowCount(v) > 0 || v.adv !== null;
}

function archerStats(match, archerIdx) {
  let sum = 0, count = 0;
  for (const v of match.volees) {
    const maxI = numArrowSlots(v);
    const pair = v.arrows[archerIdx];
    for (let i = 0; i < maxI; i++) {
      const val = arrowValue(pair[i]);
      if (val !== null) { sum += val; count++; }
    }
  }
  return { total: sum, count, avg: count > 0 ? sum / count : null };
}

function matchSetPoints(match) {
  let our = 0, their = 0;
  for (const v of match.volees) {
    const nArrows = volleyArrowCount(v);
    if (nArrows === 0) continue;
    if (v.adv === null || v.adv === '') continue;
    const ours = volleyTotal(v);
    const theirs = Number(v.adv);
    if (isNaN(theirs)) continue;
    if (ours > theirs) our += 2;
    else if (ours < theirs) their += 2;
    else { our += 1; their += 1; }
  }
  return { our, their };
}

function matchTotal(match) {
  let our = 0, their = 0;
  for (const v of match.volees) {
    our += volleyTotal(v);
    const t = Number(v.adv);
    if (!isNaN(t) && v.adv !== null && v.adv !== '') their += t;
  }
  return { our, their };
}

// Cumul des points sur les volées de score (barrage exclu). Pour le poulie c'est
// le score officiel : 4 volées × 60 = 240 max. Côté adverse = somme des « Adv. ».
function matchScoringTotal(match) {
  let our = 0, their = 0;
  for (const v of match.volees) {
    if (v.barrage) continue;
    our += volleyTotal(v);
    const t = Number(v.adv);
    if (!isNaN(t) && v.adv !== null && v.adv !== '') their += t;
  }
  return { our, their };
}

// Moyenne de points par volée (barrage exclu) sur une liste de matchs, pour
// l'équipe et pour l'adversaire. Une volée n'est comptée, de chaque côté, que
// si elle contient des données de ce côté (flèches saisies / score adverse).
// → max théorique 60 (3 tireurs × 2 flèches × 10).
function volleyAverages(matches) {
  let ourSum = 0, ourVolleys = 0;
  let advSum = 0, advVolleys = 0;
  for (const m of matches) {
    for (const v of m.volees) {
      if (v.barrage) continue;
      if (volleyArrowCount(v) > 0) { ourSum += volleyTotal(v); ourVolleys++; }
      const t = Number(v.adv);
      if (v.adv !== null && v.adv !== '' && !isNaN(t)) { advSum += t; advVolleys++; }
    }
  }
  return {
    our: ourVolleys > 0 ? ourSum / ourVolleys : null,
    their: advVolleys > 0 ? advSum / advVolleys : null,
    ourVolleys, advVolleys
  };
}

// Score de la volée de barrage (1 flèche/archer) — départage en cas d'égalité.
function matchBarrageScore(match) {
  let our = 0, their = 0, hasOur = false, hasTheir = false;
  for (const v of match.volees) {
    if (!v.barrage) continue;
    if (volleyArrowCount(v) > 0) { our += volleyTotal(v); hasOur = true; }
    const t = Number(v.adv);
    if (!isNaN(t) && v.adv !== null && v.adv !== '') { their += t; hasTheir = true; }
  }
  return { our, their, has: hasOur && hasTheir };
}

// Résultat « classique » : système de sets (2 pts par volée gagnée).
function matchResultClassique(match) {
  const sp = matchSetPoints(match);
  const hasData = match.volees.some(v => volleyHasData(v) && v.adv !== null && v.adv !== '');
  if (!hasData) return { status: 'pending', ...sp };
  if (sp.our > sp.their) return { status: 'win', ...sp };
  if (sp.our < sp.their) return { status: 'loss', ...sp };
  return { status: 'tie', ...sp };
}

// Résultat « poulie » : cumul de points (/240). Le plus haut total gagne ;
// barrage (1 flèche/archer) seulement si égalité de points avec l'adversaire.
function matchResultPoulie(match) {
  const pts = matchScoringTotal(match);
  const out = { our: pts.our, their: pts.their };
  const hasData = match.volees.some(v => !v.barrage && volleyHasData(v) && v.adv !== null && v.adv !== '');
  if (!hasData) return { status: 'pending', ...out };
  if (pts.our > pts.their) return { status: 'win', ...out };
  if (pts.our < pts.their) return { status: 'loss', ...out };
  // Égalité de points → départage au barrage si renseigné.
  const b = matchBarrageScore(match);
  if (b.has) {
    if (b.our > b.their) return { status: 'win', ...out };
    if (b.our < b.their) return { status: 'loss', ...out };
  }
  return { status: 'tie', ...out };
}

// Dispatch selon l'arme de l'équipe active (poulie = cumul, sinon sets).
function matchResult(match) {
  return bowForTeam(getActiveTeam(), ui.activeTeam) === 'poulie'
    ? matchResultPoulie(match)
    : matchResultClassique(match);
}

function getArrowClass(a) {

  if (!cat) return '';
