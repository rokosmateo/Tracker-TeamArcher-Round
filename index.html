}

function renderMatchView() {
  const container = document.getElementById('match-view');
  const match = getActiveMatch();
  if (!match) {
    container.innerHTML = `
      <div class="match-content">
        <div class="empty-state">
          <div class="display">Aucun match</div>
          <div class="hint">Ajoute un match dans la colonne de gauche pour commencer.</div>
        </div>
      </div>`;
    return;
  }

  const comp = getComps()[ui.activeComp];
  const archers = getArchers();
  const g = genderForTeam(getActiveTeam(), ui.activeTeam);
  const bow = bowForTeam(getActiveTeam(), ui.activeTeam);
  const isPoulie = bow === 'poulie';
  const fullVolleyTip = '3 ' + nArcher(g, true) + ' ont déjà tiré cette volée';
  const matchIdx = comp.matches.findIndex(m => m.id === match.id);
  const res = matchResult(match);
  const totals = matchTotal(match);
  const barrage = matchBarrageScore(match);
  let poulieRunning = 0;   // running cumulative team score for the poulie format

  let resStatusClass = res.status;
  let resStatusText = {
    win: 'Victoire', loss: 'Défaite', tie: 'Égalité', pending: 'En cours'
  }[res.status];

  // Build scoresheet rows
  let rowsHtml = '';
  match.volees.forEach((v, vi) => {
    const total = volleyTotal(v);
    const hasArrows = volleyArrowCount(v) > 0;
    const advNum = v.adv === null || v.adv === '' ? null : Number(v.adv);
    let setCellHtml = '<span class="zero">—</span>';
    if (isPoulie) {
      // Poulie : pas de sets. La colonne montre le cumul courant de l'équipe
      // (barrage exclu du cumul, marqué « = » comme départage).
      if (v.barrage) {
        setCellHtml = hasArrows ? `<span class="setpt-pair"><span class="our tie-cell">=${total}</span></span>` : '<span class="zero">—</span>';
      } else {
        if (hasArrows) poulieRunning += total;
        setCellHtml = hasArrows ? `<span class="poulie-cumul">${poulieRunning}</span>` : '<span class="zero">—</span>';
      }
    } else if (hasArrows && advNum !== null && !isNaN(advNum)) {
      if (total > advNum) setCellHtml = `<span class="setpt-pair"><span class="our win-cell">2</span><span class="dash">·</span><span class="their zero">0</span></span>`;
      else if (total < advNum) setCellHtml = `<span class="setpt-pair"><span class="our zero">0</span><span class="dash">·</span><span class="their win-cell">2</span></span>`;
      else setCellHtml = `<span class="setpt-pair"><span class="our tie-cell">1</span><span class="dash">·</span><span class="their tie-cell">1</span></span>`;
    }

    const subs = v.subs || [false, false, false, false];
    const isBarrage = !!v.barrage;
    let cellsHtml = '';
    for (let ai = 0; ai < 4; ai++) {
      const archerCanShoot = canArcherShoot(v, ai);
      if (subs[ai]) {
        cellsHtml += `
          <td class="arrow-cell sub-cell"><div class="sub-dash">—</div></td>
          <td class="arrow-cell second sub-cell"><div class="sub-dash">—</div></td>`;
      } else {
        const [a1, a2] = v.arrows[ai];
        const blockedCls = !archerCanShoot ? ' blocked' : '';
        // First arrow — always editable (via target) unless archer is blocked
        cellsHtml += `
          <td class="arrow-cell">
            <input class="arrow-input ${getArrowClass(a1)}${blockedCls}" type="text" maxlength="2"
                   data-v="${vi}" data-a="${ai}" data-i="0"
                   value="${a1 === null ? '' : a1}" readonly autocomplete="off"
                   title="${archerCanShoot ? 'Clique pour saisir avec la cible' : fullVolleyTip}">
          </td>`;
        // Second arrow — disabled in barrage volleys
        if (isBarrage) {
          cellsHtml += `<td class="arrow-cell second sub-cell"><div class="sub-dash barrage-dash">—</div></td>`;
        } else {
          cellsHtml += `
            <td class="arrow-cell second">
              <input class="arrow-input ${getArrowClass(a2)}${blockedCls}" type="text" maxlength="2"
                     data-v="${vi}" data-a="${ai}" data-i="1"
                     value="${a2 === null ? '' : a2}" readonly autocomplete="off"
                     title="${archerCanShoot ? 'Clique pour saisir avec la cible' : fullVolleyTip}">
            </td>`;
        }
      }
      if (ai < 3) cellsHtml += '<td class="sep"></td>';
    }

    const subIdx = subs.findIndex(s => s);
    const subBadge = subIdx >= 0 ? `<span class="sub-badge" title="${nNonShooter(g, true)}">-${shortArcherName(archers[subIdx])}</span>` : '';
    const barrageBadge = isBarrage ? `<span class="sub-badge barrage-badge" title="Barrage · 1 flèche par ${nArcher(g, false)}">BARRAGE</span>` : '';
    const popoverHtml = openPopoverV === vi ? `
      <div class="sub-popover" data-v="${vi}">
        <div class="popover-title">Qui ne tire pas cette volée ?</div>
        <div class="popover-chips">
          ${archers.map((n, a) => `
            <button class="sub-chip${subs[a] ? ' active' : ''}" data-sub-v="${vi}" data-sub-a="${a}">${n}</button>
          `).join('')}
          <button class="sub-chip clear${subIdx < 0 ? ' active' : ''}" data-sub-v="${vi}" data-sub-a="-1">${nAllShoot(g)}</button>
        </div>
      </div>
    ` : '';

    rowsHtml += `
      <tr class="volley-row${isBarrage ? ' volley-barrage' : ''}">
        <td class="volley-num">
          <button class="volley-num-btn" data-pop-v="${vi}" title="Définir la ${nNonShooter(g)}">V${vi + 1}${barrageBadge}${subBadge}</button>
          ${popoverHtml}
        </td>
        ${cellsHtml}
        <td class="volley-total">${hasArrows ? total : ''}</td>
        <td class="adv-cell">
          <input class="adv-input" type="text" inputmode="numeric" maxlength="3"
                 data-v="${vi}" data-adv="1"
                 value="${v.adv === null ? '' : v.adv}" autocomplete="off">
        </td>
        <td class="setpts">${setCellHtml}</td>
      </tr>`;
  });

  // Archer totals row
  let archerTotalsHtml = '';
  for (let ai = 0; ai < 4; ai++) {
    const s = archerStats(match, ai);
    archerTotalsHtml += `
      <td class="arrow-cell" colspan="2" style="text-align:center; padding-top: 0.8rem; border-top: 2px solid var(--ink);">
        <div class="archer-total">${s.total || '—'}</div>
        <div class="archer-avg">${s.avg !== null ? s.avg.toFixed(1) : ''}/f · ${s.count}f</div>
      </td>`;
    if (ai < 3) archerTotalsHtml += '<td class="sep" style="border-top: 2px solid var(--ink);"></td>';
  }

  container.innerHTML = `
    <div class="match-content">
      <div class="match-header">
        <div class="match-meta">
          <div class="match-number">${ui.activeDiscipline} · ${ui.activeTeam} · Match ${matchIdx + 1} · ${ui.activeComp}</div>
          <div class="match-title">
            <span class="team-label">${ui.activeTeam}</span>
            <span class="vs">vs.</span>
            <input class="opponent-input" id="opponent-input" value="${match.opponent.replace(/"/g, '&quot;')}" placeholder="Adversaire">
            <button class="btn-icon" id="btn-delete-match" title="Supprimer ce match">✕</button>
          </div>
        </div>
        <div class="match-result">
          <div class="result-sets">
            <span class="our">${res.our}</span>
            <span class="dash">·</span>
            <span class="their">${res.their}</span>
          </div>
          <div class="result-status ${resStatusClass}">${resStatusText}</div>
          ${isPoulie
            ? (hasArrowData(match) ? `<div style="font-family:'JetBrains Mono', monospace; font-size:0.72rem; color:var(--ink-mute); margin-top:0.4rem;">${res.our} · ${res.their} pts / 240${barrage.has ? ` · barrage ${barrage.our}·${barrage.their}` : ''}</div>` : '')
            : (hasArrowData(match) ? `<div style="font-family:'JetBrains Mono', monospace; font-size:0.72rem; color:var(--ink-mute); margin-top:0.4rem;">${totals.our} · ${totals.their} pts</div>` : '')}
        </div>
      </div>

      <div class="scoresheet-wrap">
        <table class="scoresheet">
          <thead>
            <tr>
              <th></th>
              <th class="archer-th" colspan="2" data-archer="0">${archers[0] || ''}</th>
              <th class="sep"></th>
              <th class="archer-th" colspan="2" data-archer="1">${archers[1] || ''}</th>
              <th class="sep"></th>
              <th class="archer-th" colspan="2" data-archer="2">${archers[2] || ''}</th>
              <th class="sep"></th>
              <th class="archer-th" colspan="2" data-archer="3">${archers[3] || ''}</th>
              <th>Total</th>
              <th>Adv.</th>
              <th>${isPoulie ? 'Cumul' : 'Set'}</th>
            </tr>
          </thead>
          <tbody>
            ${rowsHtml}
            <tr class="totals-row">
              <td></td>
              ${archerTotalsHtml}
              <td class="volley-total" style="padding-top: 0.8rem; border-top: 2px solid var(--ink);">${totals.our || '—'}</td>
              <td class="volley-total tiny" style="padding-top: 0.8rem; border-top: 2px solid var(--ink);">${totals.their || '—'}</td>
              <td style="padding-top: 0.8rem; border-top: 2px solid var(--ink);"></td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="input-hint">
        Clique sur une case vide pour saisir une flèche. Sur mobile, fais un <strong>appui long</strong> pour modifier une flèche déjà saisie. Chaque ${nArcher(g, false)} a sa couleur sur la cible. <kbd>V1</kbd>–<kbd>V5</kbd> pour désigner une ${nNonShooter(g)}. <kbd>V5</kbd> = barrage : 1 flèche par ${nArcher(g, false)}.${isPoulie ? ` Poulie : cumul de points (4 volées, max 240) ; le barrage ne départage qu'en cas d'égalité.` : ''}
      </div>

      <div class="match-stats">
        ${archers.map((name, ai) => {
          const s = archerStats(match, ai);
          const scoreCounts = countArcherScores(match, ai);
          return `
            <div class="archer-card">
              <div class="name">${name}</div>
              <div class="stats-row"><span>Moyenne</span><strong>${s.avg !== null ? s.avg.toFixed(2) : '—'}</strong></div>
              <div class="stats-row"><span>Total</span><strong>${s.total || '—'}</strong></div>
              <div class="stats-row"><span>Flèches</span><strong>${s.count}</strong></div>
              <div class="stats-row"><span>X / 10 / 9</span><strong>${scoreCounts.x} · ${scoreCounts['10']} · ${scoreCounts['9']}</strong></div>
            </div>`;
        }).join('')}
      </div>
    </div>
    <button class="fab-target" id="fab-target" title="Saisie tactile (cible)" aria-label="Ouvrir la cible tactile">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="12" cy="12" r="6.5" stroke="currentColor" stroke-width="1.3"/>
        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.2"/>
        <circle cx="12" cy="12" r="0.8" fill="currentColor"/>
      </svg>
    </button>
  `;

  attachScoresheetHandlers();

  // FAB: opens target modal starting at next empty slot
  const fab = document.getElementById('fab-target');
  if (fab) {
    if (READ_ONLY()) {
      fab.style.display = 'none';
    } else {
      fab.style.display = '';
      fab.onclick = (e) => {
        e.stopPropagation();
        openTargetModal();
      };
    }
  }
}

function hasArrowData(match) {
  return match.volees.some(v => volleyArrowCount(v) > 0);
}

function countArcherScores(match, archerIdx) {
  const c = { x: 0, '10': 0, '9': 0, '8': 0, '7': 0, '6': 0, '5': 0, '4': 0, '3': 0, '2': 0, '1': 0, m: 0 };
  for (const v of match.volees) {
    const maxI = numArrowSlots(v);
    const pair = v.arrows[archerIdx];
    for (let i = 0; i < maxI; i++) {
      const a = pair[i];
      const cat = arrowCategory(a);
      if (cat === 'x') c.x++;
      else if (cat === '10') c['10']++;
      else if (cat === '9') c['9']++;
      else if (cat === 'r') {
        const n = Number(a);
        if (n === 8) c['8']++; else if (n === 7) c['7']++;
      }
      else if (cat === 'b') {
        const n = Number(a);
        if (n === 6) c['6']++; else if (n === 5) c['5']++;
      }
      else if (cat === 'k') {
        const n = Number(a);
        if (n === 4) c['4']++; else if (n === 3) c['3']++;
      }
      else if (cat === 'w') {
        const n = Number(a);
        if (n === 2) c['2']++; else if (n === 1) c['1']++;
      }
      else if (cat === 'm') c.m++;
    }
  }
  return c;
}

function countArcherColors(match, archerIdx) {
  const c = { Jaune: 0, Rouge: 0, Bleu: 0, Noir: 0, Blanc: 0, Brosse: 0 };
  for (const v of match.volees) {
    const maxI = numArrowSlots(v);
    const pair = v.arrows[archerIdx];
    for (let i = 0; i < maxI; i++) {
      const g = arrowColorGroup(pair[i]);
      if (g) c[g]++;
    }
  }
  return c;
}

// ───────────────────────────────────────────────────────────
// Scoresheet handlers (all input is via the target modal)
// ───────────────────────────────────────────────────────────
function attachScoresheetHandlers() {
  const match = getActiveMatch();
  if (!match) return;

  // Opponent name
  const opInput = document.getElementById('opponent-input');
  if (opInput) {
    if (READ_ONLY()) {
      opInput.readOnly = true;
      opInput.style.cursor = 'default';
    } else {
      opInput.addEventListener('input', (e) => {
        match.opponent = e.target.value;
        renderMatchesList();
        debouncedSave();
      });
    }
  }

  // Delete match — hidden in spectator mode
  const delBtn = document.getElementById('btn-delete-match');
  if (delBtn) {
    if (READ_ONLY()) {
      delBtn.style.display = 'none';
    } else {
      delBtn.onclick = () => {
        if (!confirm(`Supprimer le match contre "${match.opponent || 'Sans nom'}" ?`)) return;
        const comp = getComps()[ui.activeComp];
        const idx = comp.matches.findIndex(m => m.id === match.id);
        comp.matches.splice(idx, 1);
        ui.activeMatchId = comp.matches[idx] ? comp.matches[idx].id : (comp.matches[idx - 1] ? comp.matches[idx - 1].id : null);
        render();
        saveState();
        saveUiPrefs();
      };
    }
  }

  // Arrow inputs — readonly. Tap an empty slot to enter a value. A slot that
  // already has a value requires a LONG PRESS on touch screens to edit it, so
  // a stray tap can't overwrite an arrow already recorded. On desktop a normal
  // click still works (accidental clicks aren't an issue with a mouse).
  document.querySelectorAll('.arrow-input').forEach(inp => {
    const vi = Number(inp.dataset.v);
    const ai = Number(inp.dataset.a);
    const ii = Number(inp.dataset.i);

    const slotFilled = () => {
      const v = match.volees[vi];
      return !!(v && v.arrows[ai] && arrowIsSet(v.arrows[ai][ii]));
    };

    const tryOpen = () => {
      if (READ_ONLY()) { showToast('Mode spectateur · clique 🔒 pour passer en mode coach'); return; }
      // Block if this archer can't shoot this volley (3-archer rule)
      if (!canArcherShoot(match.volees[vi], ai)) {
        const g = activeGender();
        showToast('3 ' + nArcher(g, true) + ' ont déjà tiré cette volée. Marque une ' + nNonShooter(g) + ' (clic sur V' + (vi + 1) + ') ou efface une flèche d\'abord.');
        return;
      }
      inp.blur();
      openTargetModal(vi, ai, ii);
    };

    let lpTimer = null;
    let touchHandled = false;   // true when the touch path already decided what to do
    const LONG_PRESS_MS = 450;
    const clearLP = () => { if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; } };

    inp.addEventListener('touchstart', () => {
      touchHandled = false;
      if (!slotFilled()) return;   // empty slot → let the click open it normally
      // Filled slot → only a long press should open the editor.
      lpTimer = setTimeout(() => {
        lpTimer = null;
        touchHandled = true;       // long press → open, and block the trailing click
        try { if (navigator.vibrate) navigator.vibrate(15); } catch (e) {}
        tryOpen();
      }, LONG_PRESS_MS);
    }, { passive: true });

    inp.addEventListener('touchmove', clearLP, { passive: true });
    inp.addEventListener('touchcancel', clearLP);
    inp.addEventListener('touchend', (e) => {
      if (lpTimer) {
        // Released before the long press completed → short tap on a filled slot.
        // Don't edit; just hint how to do it.
        clearLP();
        touchHandled = true;
        e.preventDefault();        // suppress the synthetic click
        if (!READ_ONLY() && slotFilled()) showToast('Appui long pour modifier une flèche déjà saisie');
      }
    });

    inp.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (touchHandled) { touchHandled = false; return; }  // handled by the touch path
      tryOpen();   // mouse/desktop, or a tap on an empty slot
    });
    // Prevent keyboard from opening at all on focus (iOS still sometimes tries)
    inp.addEventListener('focus', () => inp.blur());
  });

  // Adversary inputs
  const advInputs = document.querySelectorAll('.adv-input');
  advInputs.forEach(inp => {
    if (READ_ONLY()) {
      inp.readOnly = true;
      inp.style.cursor = 'default';
      return;
    }
    inp.addEventListener('input', (e) => {
      const v = e.target.value.trim();
      const vi = Number(inp.dataset.v);
      // Score adverse plafonné au max réel d'une volée : 3 archers tireurs ×
      // flèches/archer × 10 → 60 pour une volée de score, 30 pour le barrage.
      const maxAdv = 3 * numArrowSlots(match.volees[vi]) * 10;
      if (v === '') {
        match.volees[vi].adv = null;
      } else {
        const n = Number(v);
        if (!isNaN(n) && n >= 0 && n <= maxAdv) {
          match.volees[vi].adv = v;
        } else {
          e.target.value = match.volees[vi].adv || '';
          if (!isNaN(n) && n > maxAdv) showToast(`Score adverse max ${maxAdv} sur cette volée`);
          return;
        }
      }
      updateVolleyDisplay(vi);
      updateMatchHeader();
      renderMatchesList();
      debouncedSave();
    });
    inp.addEventListener('focus', () => inp.select());
  });

  // Volley-num buttons (open sub popover) — disabled in spectator mode
  document.querySelectorAll('.volley-num-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (READ_ONLY()) { showToast('Mode spectateur · clique 🔒 pour passer en mode coach'); return; }
      const vi = Number(btn.dataset.popV);
      openPopoverV = openPopoverV === vi ? null : vi;
      renderMatchView();
    });
  });

  // Sub chips inside popover
  document.querySelectorAll('.sub-chip').forEach(chip => {
    chip.addEventListener('click', (e) => {
      e.stopPropagation();
      const vi = Number(chip.dataset.subV);
      const ai = Number(chip.dataset.subA);
      setSubstitute(vi, ai);
    });
  });
}

function setSubstitute(vi, ai) {
  const match = getActiveMatch();
  if (!match) return;
  const v = match.volees[vi];
  if (!v.subs) v.subs = [false, false, false, false];
  if (ai === -1) {
    // Clear all subs
    v.subs = [false, false, false, false];
  } else {
    // Toggle: if already this archer, clear; else set only this one
    const wasActive = v.subs[ai];
    v.subs = [false, false, false, false];
    if (!wasActive) {
      v.subs[ai] = true;
      // Clear any arrows for the substituted archer (they didn't shoot)
      v.arrows[ai] = [null, null];
    }
  }
  openPopoverV = null;
  renderMatchView();
  debouncedSave();
}

// ───────────────────────────────────────────────────────────
// Target input modal (tap-the-target scoring)
// ───────────────────────────────────────────────────────────
function firstEmptyArrowSlot(match, startV = 0, startA = 0, startI = 0) {
  for (let vi = startV; vi < match.volees.length; vi++) {
    const v = match.volees[vi];
    const maxI = numArrowSlots(v);
    for (let ai = (vi === startV ? startA : 0); ai < 4; ai++) {
      if (!canArcherShoot(v, ai)) continue;
      for (let ii = (vi === startV && ai === startA ? startI : 0); ii < maxI; ii++) {
        if (!arrowIsSet(v.arrows[ai][ii])) return { v: vi, a: ai, i: ii };
      }
    }
  }
  return null;
}

function openTargetModal(startV, startA, startI) {
  if (READ_ONLY()) { showToast('Mode spectateur · clique 🔒 pour passer en mode coach'); return; }
  const match = getActiveMatch();
  if (!match) return;

  // If no explicit start, find first empty slot
  let pos;
  if (startV === undefined) {
    pos = firstEmptyArrowSlot(match);
    if (!pos) {
      // No empty slot — start at V1 first archer
      pos = { v: 0, a: 0, i: 0 };
      // Skip subs
      const subs = match.volees[0].subs || [false, false, false, false];
      while (pos.a < 4 && subs[pos.a]) pos.a++;
      if (pos.a >= 4) { pos = { v: 0, a: 0, i: 0 }; }
    }
  } else {
    pos = { v: startV, a: startA, i: startI };
  }

  targetState = pos;

  // Reconstruct the visual trail from persisted positions in this match,
  // but exclude the slot we're about to edit (so the user sees a clean slate for it)
  targetHistory = [];
  for (let vi = 0; vi < match.volees.length; vi++) {
    const volee = match.volees[vi];
    const positions = volee.positions || [];
    for (let ai = 0; ai < 4; ai++) {
      const pair = positions[ai] || [null, null];
      for (let ii = 0; ii < 2; ii++) {
        // Skip the position we're editing
        if (vi === pos.v && ai === pos.a && ii === pos.i) continue;
        const pt = pair[ii];
        const val = volee.arrows[ai] ? volee.arrows[ai][ii] : null;
        if (pt && val && val !== 'M') {
          targetHistory.push({
            x: pt.x, y: pt.y,
            color: SEG_COLORS[ai % SEG_COLORS.length],
            v: vi, a: ai, i: ii
          });
        }
      }
    }
  }

  renderTargetModal();
}

function closeTargetModal() {
  targetState = null;
  targetHistory = [];
  const overlay = document.getElementById('target-modal-overlay');
  if (overlay) overlay.remove();
}

// Internal: remove only the DOM overlay, keep targetState and targetHistory alive
function removeTargetModalDom() {
  const overlay = document.getElementById('target-modal-overlay');
  if (overlay) overlay.remove();
}

// Re-render the match view (scoresheet, totals, stats) while the target modal stays open.
// Safe because the modal overlay is a child of document.body, not of #match-view.
function refreshMatchViewInBackground() {
  if (ui.view !== 'match') return;
  renderMatchView();
}

function advanceTargetPos() {
  const match = getActiveMatch();
  if (!match || !targetState) return false;
  const { v, a, i } = targetState;
  const curMaxI = numArrowSlots(match.volees[v]);

  // Try next arrow in same archer's pair (only if this volley has a 2nd slot)
  if (i === 0 && curMaxI > 1) {
    targetState = { v, a, i: 1 };
    return true;
  }
  // Next archer (skipping anyone who can't shoot this volley)
  for (let na = a + 1; na < 4; na++) {
    if (!canArcherShoot(match.volees[v], na)) continue;
    targetState = { v, a: na, i: 0 };
    return true;
  }
  // Next volley
  if (v + 1 < match.volees.length) {
    const nv = v + 1;
    for (let na = 0; na < 4; na++) {
      if (!canArcherShoot(match.volees[nv], na)) continue;
      targetState = { v: nv, a: na, i: 0 };
      return true;
    }
  }
  return false; // End of match
}

function recedeTargetPos() {
  const match = getActiveMatch();
  if (!match || !targetState) return false;
  const { v, a, i } = targetState;

  if (i === 1) {
    targetState = { v, a, i: 0 };
    return true;
  }
  // Previous archer (skipping anyone who can't shoot), land on their last slot
  const curMaxI = numArrowSlots(match.volees[v]);
  for (let na = a - 1; na >= 0; na--) {
    if (!canArcherShoot(match.volees[v], na)) continue;
    targetState = { v, a: na, i: curMaxI - 1 };
    return true;
  }
  // Previous volley, land on last archer's last slot
  if (v > 0) {
    const pv = v - 1;
    const pMaxI = numArrowSlots(match.volees[pv]);
    for (let na = 3; na >= 0; na--) {
      if (!canArcherShoot(match.volees[pv], na)) continue;
      targetState = { v: pv, a: na, i: pMaxI - 1 };
      return true;
    }
  }
  return false;
}

function scoreAtPoint(x, y, bow) {
  const dx = x - 200, dy = y - 200;
  const d = Math.sqrt(dx * dx + dy * dy);
  const rings = targetRingDefs(bow);
  // X = mouche (centre du 10)
  if (d <= targetXRadius(bow)) return 'X';
  // Du plus petit (10) au plus grand : 1ère zone qui contient le point.
  for (let i = rings.length - 1; i >= 0; i--) {
    if (d <= rings[i].r) return String(rings[i].score);
  }
  return 'M';   // hors blason (en poulie : tout ce qui est < 5)
}

function colorForScore(val) {
  if (val === 'X' || val === '10' || val === '9') return '#e0a030';
  if (val === '8' || val === '7') return '#c53030';
  if (val === '6' || val === '5') return '#3d7cbf';
  if (val === '4' || val === '3') return '#1a1a1a';
  if (val === '2' || val === '1') return '#d0cab0';
  return '#9a2b2b';
}

// Définition des anneaux de la cible, du plus extérieur au plus intérieur.
// Classique : blason complet 10 zones (1→10). Poulie : blason RÉDUIT, seules
// les zones 5 à 10 existent, étalées sur tout le rayon (200 = centre, R=190).
function targetRingDefs(bow) {
  if (bow === 'poulie') {
    const s = 190 / 6;   // 6 zones de score (5→10) réparties sur le rayon
    return [
      { score: 5,  r: 6 * s, fill: '#3d7cbf', stroke: '#1e4272', label: '#e8eff7' },
      { score: 6,  r: 5 * s, fill: '#4a8cd0', stroke: '#1e4272', label: '#e8eff7' },
      { score: 7,  r: 4 * s, fill: '#d14545', stroke: '#7a1f1f', label: '#fff' },
      { score: 8,  r: 3 * s, fill: '#e25656', stroke: '#7a1f1f', label: '#fff' },
      { score: 9,  r: 2 * s, fill: '#e8b843', stroke: '#8a6c20', label: '#4a3a0f' },
      { score: 10, r: 1 * s, fill: '#f2c95a', stroke: '#8a6c20', label: '#4a3a0f' }
    ];
  }
  return [
    { score: 1,  r: 190, fill: '#fafaf3', stroke: '#2a2a22', label: '#2a2a22' },
    { score: 2,  r: 171, fill: '#faf7e8', stroke: '#2a2a22', label: '#2a2a22' },
    { score: 3,  r: 152, fill: '#2c2a22', stroke: '#000',    label: '#d8d3c0' },
    { score: 4,  r: 133, fill: '#2c2a22', stroke: '#5a5750', label: '#d8d3c0' },
    { score: 5,  r: 114, fill: '#3d7cbf', stroke: '#1e4272', label: '#e8eff7' },
    { score: 6,  r: 95,  fill: '#4a8cd0', stroke: '#1e4272', label: '#e8eff7' },
    { score: 7,  r: 76,  fill: '#d14545', stroke: '#7a1f1f', label: '#fff' },
    { score: 8,  r: 57,  fill: '#e25656', stroke: '#7a1f1f', label: '#fff' },
    { score: 9,  r: 38,  fill: '#e8b843', stroke: '#8a6c20', label: '#4a3a0f' },
    { score: 10, r: 19,  fill: '#f2c95a', stroke: '#8a6c20', label: '#4a3a0f' }
  ];
}
// Rayon de la zone X (mouche) = moitié du plus petit anneau (le 10).
function targetXRadius(bow) {
  const rings = targetRingDefs(bow);
  return rings[rings.length - 1].r / 2;
}
// Arme de l'équipe active, pour la cible et le groupement.
function activeBow() { return bowForTeam(getActiveTeam(), ui.activeTeam); }

// Returns SVG markup for the archery target face (rings + labels + X cross).
// Size is controlled by the viewBox; callers wrap it in their own <svg>.
function targetFaceSvgMarkup(bow) {
  const rings = targetRingDefs(bow);
  const ringsSvg = rings.map(ring =>
    `<circle cx="200" cy="200" r="${ring.r}" fill="${ring.fill}" stroke="${ring.stroke}" stroke-width="0.7"/>`
  ).join('');
  const xR = targetXRadius(bow);
  const xMarker = `
    <circle cx="200" cy="200" r="${(xR).toFixed(1)}" fill="none" stroke="#8a6c20" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.7"/>
    <line x1="197" y1="200" x2="203" y2="200" stroke="#8a6c20" stroke-width="1" opacity="0.7"/>
    <line x1="200" y1="197" x2="200" y2="203" stroke="#8a6c20" stroke-width="1" opacity="0.7"/>
  `;
  return ringsSvg + xMarker;
}

function renderTargetModal() {
  const match = getActiveMatch();
  if (!match || !targetState) return;

  const { v, a, i } = targetState;
  const archerName = getArchers()[a];
  const isBarrage = !!match.volees[v].barrage;
  const currentVal = match.volees[v].arrows[a][i];
  const hasValue = arrowIsSet(currentVal);

  // Subtitle text
  const flecheLabel = isBarrage ? 'Flèche de barrage' : `Flèche ${i + 1}`;
  const subtitleText = `Volée ${v + 1} · ${flecheLabel}${hasValue ? ' · actuellement : ' + currentVal : ''}`;

  // Previously placed (via target) arrows — markers still shown on the target
  const markersHtml = targetHistory.map(h => `
    <circle class="target-marker" cx="${h.x}" cy="${h.y}" r="5"
            fill="${h.color}" stroke="#fff" stroke-width="1.8" opacity="1"/>
  `).join('');

  // Build target SVG (World Archery face — full pour classique, réduit 5→10
  // pour poulie). ViewBox 0 0 400 400, center at 200,200.
  // Labels placés à mi-hauteur de chaque anneau, sur la moitié supérieure.
  const bow = activeBow();
  const ringDefs = targetRingDefs(bow);
  const labelsSvg = ringDefs.map((ring, idx) => {
    const outer = ring.r;
    const inner = idx < ringDefs.length - 1 ? ringDefs[idx + 1].r : targetXRadius(bow);
    const mid = (outer + inner) / 2;
    return `<text x="200" y="${(200 - mid).toFixed(1)}" text-anchor="middle" dy="3.5"
           font-family="'JetBrains Mono', monospace" font-size="8" fill="${ring.label}"
           font-weight="600" opacity="0.7">${ring.score}</text>`;
  }).join('');

  const overlay = document.createElement('div');
  overlay.id = 'target-modal-overlay';
  overlay.className = 'target-modal-overlay';
  overlay.innerHTML = `
    <div class="target-modal" onclick="event.stopPropagation();">
      <div class="target-modal-head">
        <div>
          <div class="who"><span class="who-dot" style="background:${SEG_COLORS[a % SEG_COLORS.length]};"></span>${archerName}</div>
          <div class="when">${subtitleText}</div>
        </div>
        <button class="target-close" id="target-close-btn" title="Fermer">✕</button>
      </div>

      <div class="target-wrap">
        <svg class="target-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg" id="target-svg">
          <defs>
            <clipPath id="loupe-clip">
              <circle cx="0" cy="0" r="56"/>
            </clipPath>
          </defs>
          ${targetFaceSvgMarkup(bow)}
          ${labelsSvg}
          <g id="target-markers">${markersHtml}</g>
          <circle id="preview-marker" class="target-marker" cx="0" cy="0" r="6"
                  fill="none" stroke="#fff" stroke-width="2" opacity="0"/>

          <!-- Loupe / magnifier: shown during touch or mouse-drag. -->
          <g id="loupe-group" style="display:none; pointer-events:none;">
            <circle id="loupe-shadow" cx="0" cy="0" r="62" fill="rgba(0,0,0,0.5)"/>
            <g id="loupe-content" clip-path="url(#loupe-clip)">
              <!-- Magnified target — injected via JS because we need dynamic transform -->
              <g id="loupe-target-clone"></g>
              <!-- Crosshair at center of loupe -->
              <line x1="-18" y1="0" x2="-6" y2="0" stroke="#fff" stroke-width="1.5"/>
              <line x1="6" y1="0" x2="18" y2="0" stroke="#fff" stroke-width="1.5"/>
              <line x1="0" y1="-18" x2="0" y2="-6" stroke="#fff" stroke-width="1.5"/>
              <line x1="0" y1="6" x2="0" y2="18" stroke="#fff" stroke-width="1.5"/>
              <circle cx="0" cy="0" r="2" fill="#fff"/>
            </g>
            <circle cx="0" cy="0" r="56" fill="none" stroke="#fff" stroke-width="2.5"/>
            <circle cx="0" cy="0" r="56" fill="none" stroke="rgba(0,0,0,0.6)" stroke-width="1"/>
          </g>
        </svg>
      </div>

      <div class="target-readout">
        <div>
          <div class="pending-label">Score</div>
          <div class="pending-score" id="pending-score">—</div>
        </div>
        <div class="target-readout-meta" id="target-meta">Touche la cible pour placer la flèche</div>
      </div>

      <div class="target-actions">
        <button id="target-miss" class="miss" title="Manqué (M) — valide et ferme">Manqué (M)</button>
        <button id="target-clear" title="Effacer cette flèche">Effacer</button>
      </div>
    </div>
  `;

  document.body.appendChild(overlay);

  // Tap background to close
  overlay.addEventListener('click', () => {
    closeTargetModal();
    renderMatchView();
  });

  // Close button
  document.getElementById('target-close-btn').onclick = () => {
    closeTargetModal();
    if (ui.view === 'match') renderMatchView();
  };

  // Target SVG tap
  const svg = document.getElementById('target-svg');
  const previewMarker = document.getElementById('preview-marker');
  const pendingScore = document.getElementById('pending-score');
  const meta = document.getElementById('target-meta');

  function svgPointFromEvent(evt) {
    const rect = svg.getBoundingClientRect();
    const isTouch = evt.touches && evt.touches[0];
    const cx = isTouch ? evt.touches[0].clientX : evt.clientX;
    const cy = isTouch ? evt.touches[0].clientY : evt.clientY;
    if (cx === undefined) return null;
    const x = ((cx - rect.left) / rect.width) * 400;
    const y = ((cy - rect.top) / rect.height) * 400;
    return { x, y };
  }

  let pendingValue = null;
  let pendingPoint = null;
  let isDragging = false;

  const loupeGroup = document.getElementById('loupe-group');
  const loupeTargetClone = document.getElementById('loupe-target-clone');
  const loupeShadow = document.getElementById('loupe-shadow');

  // Fill the loupe with a scaled copy of the target face
  // Loupe zoom factor ~3x: when centered at (px,py), we scale the whole face
  // so the area around (px,py) fills the loupe.
  loupeTargetClone.innerHTML = targetFaceSvgMarkup(bow);

  function updateLoupe(pt) {
    const zoom = 1.5;
    // Loupe center is offset above the finger so it's not hidden
    const loupeCenterX = Math.max(66, Math.min(334, pt.x));
    const loupeCenterY = Math.max(70, pt.y - 80);  // 80 above the finger
    loupeGroup.setAttribute('transform', `translate(${loupeCenterX},${loupeCenterY})`);
    // The cloned target needs to be transformed so that (pt.x, pt.y) lands at loupe center (0,0 in loupe local coords)
    loupeTargetClone.setAttribute('transform', `scale(${zoom}) translate(${-pt.x},${-pt.y})`);
    loupeGroup.style.display = 'block';
  }
  function hideLoupe() { loupeGroup.style.display = 'none'; }

  function showPreview(pt) {
    previewMarker.setAttribute('cx', pt.x);
    previewMarker.setAttribute('cy', pt.y);
    previewMarker.setAttribute('opacity', '1');
    // Couleur de l'archer en cours d'édition (cohérent avec le code couleur cible)
    const color = SEG_COLORS[a % SEG_COLORS.length];
    previewMarker.setAttribute('fill', color);
  }
  function hidePreview() { previewMarker.setAttribute('opacity', '0'); }

  function handlePoint(pt) {
    pendingPoint = pt;
    pendingValue = scoreAtPoint(pt.x, pt.y, bow);
    pendingScore.textContent = pendingValue === 'M' ? 'M' : pendingValue;
    showPreview(pt);
    updateLoupe(pt);
    meta.textContent = 'Relâche pour valider · ' + (pendingValue === 'M' ? 'Raté' : 'Score ' + pendingValue);
  }

  function commitPending() {
    if (!pendingValue) return;
    const match = getActiveMatch();
    const { v, a, i } = targetState;
    match.volees[v].arrows[a][i] = pendingValue;
    if (!match.volees[v].positions) {
      match.volees[v].positions = [[null,null],[null,null],[null,null],[null,null]];
    }
    if (pendingPoint && pendingValue !== 'M') {
      match.volees[v].positions[a][i] = { x: pendingPoint.x, y: pendingPoint.y };
    } else {
      match.volees[v].positions[a][i] = null;
    }
    debouncedSave();
    // Close and return to the match view
    closeTargetModal();
    if (ui.view === 'match') renderMatchView();
  }

  function cancelPending() {
    pendingValue = null;
    pendingPoint = null;
    isDragging = false;
    hideLoupe();
    hidePreview();
    pendingScore.textContent = '—';
    meta.textContent = 'Touche la cible pour placer la flèche';
  }

  // ── Touch events (mobile primary interaction) ──
  svg.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const pt = svgPointFromEvent(e);
    if (!pt) return;
    isDragging = true;
    handlePoint(pt);
  }, { passive: false });

  svg.addEventListener('touchmove', (e) => {
    if (!isDragging) return;
    e.preventDefault();
    const pt = svgPointFromEvent(e);
    if (pt) handlePoint(pt);
  }, { passive: false });

  svg.addEventListener('touchend', (e) => {
    if (!isDragging) return;
    e.preventDefault();
    isDragging = false;
    hideLoupe();
    commitPending();
  }, { passive: false });

  svg.addEventListener('touchcancel', () => {
    cancelPending();
  });

  // ── Mouse events (desktop fallback) ──
  svg.addEventListener('mousedown', (e) => {
    e.preventDefault();
    const pt = svgPointFromEvent(e);
    if (!pt) return;
    isDragging = true;
    handlePoint(pt);
  });
  svg.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const pt = svgPointFromEvent(e);
    if (pt) handlePoint(pt);
  });
  svg.addEventListener('mouseup', (e) => {
    if (!isDragging) return;
    isDragging = false;
    hideLoupe();
    commitPending();
  });
  svg.addEventListener('mouseleave', () => {
    if (!isDragging) return;
    // Treat as cancel if dragged off the target
    cancelPending();
  });

  // Action buttons
  document.getElementById('target-miss').onclick = () => {
    const match = getActiveMatch();
    const { v, a, i } = targetState;
    match.volees[v].arrows[a][i] = 'M';
    if (match.volees[v].positions) match.volees[v].positions[a][i] = null;
    debouncedSave();
    closeTargetModal();
    if (ui.view === 'match') renderMatchView();
  };
  document.getElementById('target-clear').onclick = () => {
    const match = getActiveMatch();
    const { v, a, i } = targetState;
    match.volees[v].arrows[a][i] = null;
    if (match.volees[v].positions) match.volees[v].positions[a][i] = null;
    debouncedSave();
    closeTargetModal();
    if (ui.view === 'match') renderMatchView();
  };
}

// Partial updates without full rerender (keeps focus alive)
function updateVolleyDisplay(vi) {
  const match = getActiveMatch();
  const v = match.volees[vi];
  const total = volleyTotal(v);
  const hasArrows = volleyArrowCount(v) > 0;
  const row = document.querySelectorAll('.volley-row')[vi];
  if (!row) return;
  const totalTd = row.querySelector('.volley-total');
  if (totalTd) totalTd.textContent = hasArrows ? total : '';
  // set cell
  const setTd = row.querySelector('.setpts');
  if (setTd) {
    const advNum = v.adv === null || v.adv === '' ? null : Number(v.adv);
    let html = '<span class="zero">—</span>';
    if (hasArrows && advNum !== null && !isNaN(advNum)) {
      if (total > advNum) html = `<span class="setpt-pair"><span class="our win-cell">2</span><span class="dash">·</span><span class="their zero">0</span></span>`;
      else if (total < advNum) html = `<span class="setpt-pair"><span class="our zero">0</span><span class="dash">·</span><span class="their win-cell">2</span></span>`;
      else html = `<span class="setpt-pair"><span class="our tie-cell">1</span><span class="dash">·</span><span class="their tie-cell">1</span></span>`;
    }
    setTd.innerHTML = html;
  }
}

function updateMatchHeader() {
  const match = getActiveMatch();
  if (!match) return;
  const res = matchResult(match);
  const totals = matchTotal(match);
  const header = document.querySelector('.match-result');
  if (!header) return;

  const statusText = { win: 'Victoire', loss: 'Défaite', tie: 'Égalité', pending: 'En cours' }[res.status];
  header.innerHTML = `
    <div class="result-sets">
      <span class="our">${res.our}</span>
      <span class="dash">·</span>
      <span class="their">${res.their}</span>
    </div>
    <div class="result-status ${res.status}">${statusText}</div>
    ${hasArrowData(match) ? `<div style="font-family:'JetBrains Mono', monospace; font-size:0.72rem; color:var(--ink-mute); margin-top:0.4rem;">${totals.our} · ${totals.their} pts</div>` : ''}
  `;

  // Update totals row
  const totalsRow = document.querySelector('tr.totals-row');
  if (totalsRow) {
    const tds = totalsRow.querySelectorAll('td');
    // tds[0] = empty, then 4 archer totals (colspan 2 each) with separators, then team total, adv total, empty
    // Update archer totals
    for (let ai = 0; ai < 4; ai++) {
      const s = archerStats(match, ai);
      const idx = 1 + ai * 2; // accounts for separators
      const td = tds[idx];
      if (td) {
        td.innerHTML = `
          <div class="archer-total">${s.total || '—'}</div>
          <div class="archer-avg">${s.avg !== null ? s.avg.toFixed(1) : ''}/f · ${s.count}f</div>`;
      }
    }
    // team total
    const totalTd = totalsRow.querySelector('.volley-total');
    if (totalTd) totalTd.textContent = totals.our || '—';
    const advTotalTd = totalsRow.querySelector('.volley-total.tiny');
    if (advTotalTd) advTotalTd.textContent = totals.their || '—';
  }

  // Update matches list badge
  renderMatchesList();
}

function updateArcherCard(ai) {
  const match = getActiveMatch();
  if (!match) return;
  const cards = document.querySelectorAll('.archer-card');
  const card = cards[ai];
  if (!card) return;
  const s = archerStats(match, ai);
  const scoreCounts = countArcherScores(match, ai);
  const name = getArchers()[ai];
  card.innerHTML = `
    <div class="name">${name}</div>
    <div class="stats-row"><span>Moyenne</span><strong>${s.avg !== null ? s.avg.toFixed(2) : '—'}</strong></div>
    <div class="stats-row"><span>Total</span><strong>${s.total || '—'}</strong></div>
    <div class="stats-row"><span>Flèches</span><strong>${s.count}</strong></div>
    <div class="stats-row"><span>X / 10 / 9</span><strong>${scoreCounts.x} · ${scoreCounts['10']} · ${scoreCounts['9']}</strong></div>
  `;
}

// ───────────────────────────────────────────────────────────
// Global stats view
// ───────────────────────────────────────────────────────────
function allMatches() {
  const out = [];
  for (const name of getCompOrder()) {
    const comp = getComps()[name];
    if (!comp) continue;
    for (const m of comp.matches) out.push({ compName: name, match: m });
  }
  return out;
}

// ───────────────────────────────────────────────────────────
// Grouping view — cumulative arrow positions per archer
// ───────────────────────────────────────────────────────────
function collectArcherPositions(matches, archerIdx) {
  // Returns: { shots: [{x, y, score}...], counts: {x, 10, 9, ...}, total, arrowCount, avg, mpi: {x,y} | null, spread: number }
  const shots = [];
  let total = 0, arrowCount = 0;
  const counts = { x: 0, '10': 0, '9': 0, '8': 0, '7': 0, '6': 0, '5': 0, '4': 0, '3': 0, '2': 0, '1': 0, m: 0 };

  for (const m of matches) {
    for (const v of m.volees) {
      const positions = v.positions || [];
      const maxI = numArrowSlots(v);
      for (let i = 0; i < maxI; i++) {
        const val = v.arrows[archerIdx] ? v.arrows[archerIdx][i] : null;
        if (!arrowIsSet(val)) continue;
        arrowCount++;
        const numeric = arrowValue(val);
        if (numeric !== null) total += numeric;
        const cat = arrowCategory(val);
        if (cat === 'x') counts.x++;
        else if (cat === '10') counts['10']++;
        else if (cat === '9') counts['9']++;
        else if (cat === 'm') counts.m++;
        else if (cat === 'r') { counts[Number(val) === 8 ? '8' : '7']++; }
        else if (cat === 'b') { counts[Number(val) === 6 ? '6' : '5']++; }
        else if (cat === 'k') { counts[Number(val) === 4 ? '4' : '3']++; }
        else if (cat === 'w') { counts[Number(val) === 2 ? '2' : '1']++; }

        const pt = positions[archerIdx] ? positions[archerIdx][i] : null;
        if (pt && val !== 'M') {
          shots.push({ x: pt.x, y: pt.y, score: String(val) });
        }
      }
    }
  }

  // Mean point of impact (MPI)
  let mpi = null;
  if (shots.length > 0) {
    const sx = shots.reduce((s, p) => s + p.x, 0) / shots.length;
    const sy = shots.reduce((s, p) => s + p.y, 0) / shots.length;
    mpi = { x: sx, y: sy };
  }

  // Spread = max pairwise distance (group size)
  let spread = 0;
  for (let i = 0; i < shots.length; i++) {
    for (let j = i + 1; j < shots.length; j++) {
      const dx = shots[i].x - shots[j].x;
      const dy = shots[i].y - shots[j].y;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d > spread) spread = d;
    }
  }

  return {
    shots, counts, total, arrowCount,
    avg: arrowCount > 0 ? total / arrowCount : null,
    mpi, spread
  };
}

function renderGroupingView() {
  const container = document.getElementById('grouping-view');

  // Determine scope
  const scope = ui.groupingScope || 'current';
  let matches = [];
  let scopeLabel = '';

  if (scope === 'current') {
    const m = getActiveMatch();
    if (m) {
      matches = [m];
      const comp = getComps()[ui.activeComp];
      const idx = comp ? comp.matches.findIndex(x => x.id === m.id) : 0;
      scopeLabel = `Match ${idx + 1} · ${ui.activeComp} · ${ui.activeTeam} vs ${m.opponent || 'Sans nom'}`;
    } else {
      scopeLabel = 'Aucun match sélectionné';
    }
  } else if (scope === 'comp') {
    const comp = getComps()[ui.activeComp];
    matches = comp ? comp.matches : [];
    scopeLabel = `Compétition : ${ui.activeComp} · ${matches.length} match${matches.length > 1 ? 'es' : ''}`;
  } else {
    matches = allMatches().map(x => x.match);
    scopeLabel = `Toute la saison · ${matches.length} matches sur ${getCompOrder().length} compétitions`;
  }

  const stats = getArchers().map((_, ai) => collectArcherPositions(matches, ai));
  const totalShotsWithPosition = stats.reduce((s, a) => s + a.shots.length, 0);

  // Build cards
  const cardsHtml = getArchers().map((name, ai) => {
    const s = stats[ai];

    // Plot dots for this archer
    const dotsSvg = s.shots.map(shot => {
      const c = SEG_COLORS[ai % SEG_COLORS.length];
      // Slight transparency so overlapping dots show density
      return `<circle cx="${shot.x.toFixed(1)}" cy="${shot.y.toFixed(1)}" r="5" fill="${c}" stroke="#fff" stroke-width="1.6" opacity="0.95"/>`;
    }).join('');

    // MPI marker (white crosshair)
    const mpiSvg = s.mpi ? `
      <g class="mpi-group">
        <circle class="mpi-marker" cx="${s.mpi.x.toFixed(1)}" cy="${s.mpi.y.toFixed(1)}" r="8"/>
        <circle class="mpi-marker-inner" cx="${s.mpi.x.toFixed(1)}" cy="${s.mpi.y.toFixed(1)}" r="1.5"/>
        <line x1="${(s.mpi.x - 10).toFixed(1)}" y1="${s.mpi.y.toFixed(1)}" x2="${(s.mpi.x + 10).toFixed(1)}" y2="${s.mpi.y.toFixed(1)}" stroke="#fff" stroke-width="1"/>
        <line x1="${s.mpi.x.toFixed(1)}" y1="${(s.mpi.y - 10).toFixed(1)}" x2="${s.mpi.x.toFixed(1)}" y2="${(s.mpi.y + 10).toFixed(1)}" stroke="#fff" stroke-width="1"/>
      </g>
    ` : '';

    const noDataHtml = s.shots.length === 0 ? `
      <div class="no-data">

function renderGlobalView() {
  const container = document.getElementById('global-view');

  // Aggregate per archer: total, count, score distribution, color distribution
  const archers = getArchers();
  const perArcher = archers.map((_, ai) => ({
    total: 0, count: 0,
    scores: { x: 0, '10': 0, '9': 0, '8': 0, '7': 0, '6': 0, '5': 0, '4': 0, '3': 0, '2': 0, '1': 0, m: 0 },
    colors: { Jaune: 0, Rouge: 0, Bleu: 0, Noir: 0, Blanc: 0, Brosse: 0 }
  }));

  let totalMatches = 0, playedMatches = 0, wins = 0, losses = 0, ties = 0;
  for (const { match } of allMatches()) {
    totalMatches++;
    const res = matchResult(match);
    if (res.status !== 'pending') {
      playedMatches++;
      if (res.status === 'win') wins++;
      else if (res.status === 'loss') losses++;
      else ties++;
    }
    for (let ai = 0; ai < 4; ai++) {
      const s = archerStats(match, ai);
      perArcher[ai].total += s.total;
      perArcher[ai].count += s.count;
      const sc = countArcherScores(match, ai);
      for (const k in sc) perArcher[ai].scores[k] += sc[k];
      const cc = countArcherColors(match, ai);
      for (const k in cc) perArcher[ai].colors[k] += cc[k];
    }
  }

  // Rank archers by average
  const ranked = perArcher.map((p, i) => ({
    ...p, name: archers[i], idx: i,

  const maxAvg = Math.max(10, ...ranked.map(r => r.avg || 0));

function exportData() {
  try {
    const data = JSON.stringify(state, null, 2);
    const blob = new Blob([data], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `suivi-match_${new Date().toISOString().slice(0,10)}.json`;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    // Clean up after a short delay so the browser actually starts the download
    setTimeout(() => {
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }, 100);
    showToast('Fichier JSON téléchargé — vérifie ton dossier Téléchargements');
  } catch (err) {
    console.error('Export failed:', err);
    alert('Export impossible : ' + err.message);
  }
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (!confirm('L\'import remplacera toutes les données actuelles — y compris celles des autres appareils connectés. Continuer ?')) {
    e.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      const loaded = JSON.parse(evt.target.result);
      if (!loaded.competitions && !loaded.disciplines) throw new Error('Format invalide');
      state = { ...defaultState(), ...loaded };
      // If importing the old flat format, drop the default-seeded disciplines so
      // migrateState() rebuilds them purely from the imported competitions.
      if (loaded.competitions) { delete state.disciplines; delete state.disciplineOrder; }
      migrateState();
      resolveActiveMatch();
      render();
      saveState();
      saveUiPrefs();
      alert('Données importées !');
    } catch (err) {
      alert('Erreur : ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function resetData() {
  if (!confirm('Réinitialiser toutes les données ? ATTENTION : cela efface aussi les données des autres appareils connectés.')) return;
  state = defaultState();
  resolveActiveMatch();
  render();
  saveState();
  saveUiPrefs();
}

function openAddCompModal() {
  const team = getActiveTeam();
  if (!team) { alert('Crée d\'abord une équipe.'); return; }
  showModal('Nouvelle compétition', 'Nom', '', (name) => {
    name = name.trim();
    if (!name) return;
    if (team.competitions[name]) { alert('Cette compétition existe déjà.'); return; }
    team.competitions[name] = { matches: [] };
    team.compOrder.push(name);
    ui.activeComp = name;
    ui.activeMatchId = null;
    render();
    saveState();
    saveUiPrefs();
  });
}

function openRenameCompModal(oldName) {
  const team = getActiveTeam();
  if (!team) return;
  showModal('Renommer la compétition', 'Nom', oldName, (newName) => {
    newName = newName.trim();
    if (!newName || newName === oldName) return;
    if (team.competitions[newName]) { alert('Ce nom est déjà pris.'); return; }
    team.competitions[newName] = team.competitions[oldName];
    delete team.competitions[oldName];
    team.compOrder = team.compOrder.map(n => n === oldName ? newName : n);
    if (ui.activeComp === oldName) ui.activeComp = newName;
    render();
    saveState();
    saveUiPrefs();
  }, () => {
    // Delete option
    if (team.compOrder.length <= 1) { alert('Impossible de supprimer la dernière compétition.'); return; }
    if (!confirm(`Supprimer la compétition "${oldName}" et tous ses matches ?`)) return;
    delete team.competitions[oldName];
    team.compOrder = team.compOrder.filter(n => n !== oldName);
    if (ui.activeComp === oldName) {
      ui.activeComp = team.compOrder[0];
      ui.activeMatchId = team.competitions[ui.activeComp].matches[0]?.id || null;
    }
    closeModal();
    render();
    saveState();
    saveUiPrefs();
  });
}

function openAddDisciplineModal() {
  showModal('Nouvelle discipline', 'Nom (ex. Salle, Extérieur)', '', (name) => {
    name = name.trim();
    if (!name) return;
    if (state.disciplines[name]) { alert('Cette discipline existe déjà.'); return; }

// the bow, which determines the match format to apply later.
function openTeamModal(teamName) {
  const disc = getActiveDiscipline();
  if (!disc) { alert('Crée d\'abord une discipline.'); return; }

  const team = isEdit ? disc.teams[teamName] : null;
  const esc = (s) => String(s).replace(/"/g, '&quot;');

  // Types already used by OTHER teams (no duplicates of the same type per discipline).
  const usedByOthers = new Set((disc.teamOrder || []).filter(n => n !== teamName));
  const available = TEAM_TYPES.filter(t => !usedByOthers.has(t.name));
  if (!isEdit && available.length === 0) {
    alert('Toutes les équipes (Femme/Homme · Classique/Poulie) existent déjà dans cette discipline.');
    return;
  }

  const currentType = isEdit
    ? (teamTypeByName(teamName) ? teamName : (available[0] ? available[0].name : teamName))

    ? [team.archers[0] || '', team.archers[1] || '', team.archers[2] || '', team.archers[3] || '']

  const optionsHtml = TEAM_TYPES.map(t => {

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `

      <h3>${isEdit ? 'Modifier l\'équipe' : 'Nouvelle équipe'}</h3>
      <label class="field-label">Type d'équipe</label>

      <label class="field-label" id="team-archers-label"></label>
      <div class="archer-fields">
        <input type="text" class="team-archer" data-i="0" value="${esc(a[0])}">
        <input type="text" class="team-archer" data-i="1" value="${esc(a[1])}">
        <input type="text" class="team-archer" data-i="2" value="${esc(a[2])}">
        <input type="text" class="team-archer" data-i="3" value="${esc(a[3])}">
      </div>
      <div class="modal-actions">
        ${isEdit ? '<button class="btn danger" id="team-delete">Supprimer</button>' : ''}
        <div style="flex:1;"></div>
        <button class="btn" id="team-cancel">Annuler</button>
        <button class="btn primary" id="team-ok">${isEdit ? 'Enregistrer' : 'Créer'}</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const close = () => overlay.remove();
  overlay.onclick = (e) => { if (e.target === overlay) close(); };

  const select = overlay.querySelector('#team-type-select');
  const label = overlay.querySelector('#team-archers-label');
  const inputs = [...overlay.querySelectorAll('.team-archer')];
  const refreshLabels = () => {
    const tt = teamTypeByName(select.value);
    const g = tt ? tt.gender : 'F';
    label.textContent = `Archers (4 · le format actuel fait tirer 3 ${nArcher(g, true)} + 1 ${nSub(g)})`;
    inputs.forEach((el, i) => { el.placeholder = `${nArcher(g, false, true)} ${i + 1}`; });
  };
  refreshLabels();
  select.onchange = refreshLabels;
  if (inputs[0]) inputs[0].focus();

  overlay.querySelector('#team-cancel').onclick = close;
  overlay.querySelector('#team-ok').onclick = () => {
    const tt = teamTypeByName(select.value);
    if (!tt) { alert('Choisis un type d\'équipe.'); return; }
    const newName = tt.name;
    const newArchers = inputs.map(el => el.value.trim());
    if (!isEdit) {
      if (disc.teams[newName]) { alert('Cette équipe existe déjà.'); return; }
      disc.teams[newName] = {
        archers: newArchers,
        gender: tt.gender,
        bow: tt.bow,
        format: 'classique',
        compOrder: [],
        competitions: {}
      };
      disc.teamOrder.push(newName);
      ui.activeTeam = newName;
      ui.activeComp = null;
      ui.activeMatchId = null;
      resolveActiveMatch();
    } else {
      if (newName !== teamName && disc.teams[newName]) { alert('Ce type d\'équipe existe déjà.'); return; }
      team.archers = newArchers;
      team.gender = tt.gender;
      team.bow = tt.bow;
      if (newName !== teamName) {
        disc.teams[newName] = team;
        delete disc.teams[teamName];
        disc.teamOrder = disc.teamOrder.map(n => n === teamName ? newName : n);
        if (ui.activeTeam === teamName) ui.activeTeam = newName;
      }
    }
    close();
    render();
    saveState();
    saveUiPrefs();
  };
  if (isEdit) {
    overlay.querySelector('#team-delete').onclick = () => {
      if (disc.teamOrder.length <= 1) { alert('Impossible de supprimer la dernière équipe de la discipline.'); return; }
      if (!confirm(`Supprimer l'équipe "${teamName}" et tous ses matches ?`)) return;
      delete disc.teams[teamName];
      disc.teamOrder = disc.teamOrder.filter(n => n !== teamName);
      if (ui.activeTeam === teamName) ui.activeTeam = disc.teamOrder[0];
      resolveActiveMatch();
      close();
      render();
      saveState();
      saveUiPrefs();
    };
  }
}

function showModal(title, placeholder, defaultValue, onConfirm, onDelete) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>${title}</h3>
      <input type="text" id="modal-input" placeholder="${placeholder}" value="${defaultValue.replace(/"/g, '&quot;')}">
      <div class="modal-actions">
        ${onDelete ? '<button class="btn danger" id="modal-delete">Supprimer</button>' : ''}
        <div style="flex:1;"></div>
        <button class="btn" id="modal-cancel">Annuler</button>
        <button class="btn primary" id="modal-ok">OK</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  const input = overlay.querySelector('#modal-input');
  input.focus();
  input.select();

  const close = () => overlay.remove();
  overlay.querySelector('#modal-cancel').onclick = close;
  overlay.querySelector('#modal-ok').onclick = () => {
    const val = input.value;
    close();
    onConfirm(val);
  };
  input.onkeydown = (e) => {
    if (e.key === 'Enter') { overlay.querySelector('#modal-ok').click(); }
    else if (e.key === 'Escape') close();
  };
  overlay.onclick = (e) => { if (e.target === overlay) close(); };
  if (onDelete) overlay.querySelector('#modal-delete').onclick = onDelete;
  window._closeModal = close;
}
function closeModal() { if (window._closeModal) window._closeModal(); }

// Add match
document.getElementById('btn-add-match').onclick = () => {
  if (READ_ONLY()) { showToast('Mode spectateur · clique 🔒 pour passer en mode coach'); return; }
  showModal('Nouveau match', 'Nom de l\'adversaire', '', (opp) => {
    const comp = getComps()[ui.activeComp];
    if (!comp) { showToast('Crée d\'abord une compétition (+ Ajouter)'); return; }
    const m = emptyMatch(opp);
    comp.matches.push(m);
    ui.activeMatchId = m.id;
    ui.view = 'match';
    render();
    saveState();
    saveUiPrefs();
  });
};

// View toggle
document.getElementById('view-match').onclick = () => {
  ui.view = 'match';
  render();
  saveUiPrefs();
};
document.getElementById('view-grouping').onclick = () => {
  ui.view = 'grouping';
  render();
  saveUiPrefs();
};
document.getElementById('view-global').onclick = () => {
  ui.view = 'global';
  render();
  saveUiPrefs();
};

// ───────────────────────────────────────────────────────────
// Main render dispatcher
// ───────────────────────────────────────────────────────────
function render() {
  renderDisciplineTabs();
  renderTeamTabs();
  renderCompTabs();

  const matchView = document.getElementById('match-view');
  const groupingView = document.getElementById('grouping-view');
  const globalView = document.getElementById('global-view');
  const panel = document.getElementById('matches-panel');

  document.getElementById('view-match').classList.toggle('active', ui.view === 'match');
  document.getElementById('view-grouping').classList.toggle('active', ui.view === 'grouping');
  document.getElementById('view-global').classList.toggle('active', ui.view === 'global');

  if (ui.view === 'global') {
    matchView.classList.add('hidden');
    groupingView.classList.add('hidden');
    panel.style.display = 'none';
    globalView.classList.remove('hidden');
    document.querySelector('main').style.gridTemplateColumns = '1fr';
    renderGlobalView();
  } else if (ui.view === 'grouping') {
    matchView.classList.add('hidden');
    globalView.classList.add('hidden');
    panel.style.display = 'none';
    groupingView.classList.remove('hidden');
    document.querySelector('main').style.gridTemplateColumns = '1fr';
    renderGroupingView();
  } else {
    matchView.classList.remove('hidden');
    groupingView.classList.add('hidden');
    panel.style.display = '';
    globalView.classList.add('hidden');
    document.querySelector('main').style.gridTemplateColumns = '';
    renderMatchesList();
    renderMatchView();
  }
}

// ───────────────────────────────────────────────────────────
// Global listeners (registered once)
// ───────────────────────────────────────────────────────────
document.addEventListener('click', () => {
  if (openPopoverV !== null) {
    openPopoverV = null;
    if (ui.view === 'match') renderMatchView();
  }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (targetState) { closeTargetModal(); return; }
    if (openPopoverV !== null) { openPopoverV = null; renderMatchView(); return; }
  }
});

// ───────────────────────────────────────────────────────────
// Boot
// ───────────────────────────────────────────────────────────
(async () => {
  applyAppConfig();
  document.getElementById('mode-toggle').onclick = toggleCoachMode;
  applyCoachMode();
  await loadState();
  render();
})();

</script>
</body>
